automation:
  - id: roborock_weekday_slot_defaults_on_start
    alias: Roborock Scheduler – Default-Zeiten setzen (nur wenn leer/00:00)
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_datetime.roborock_time_mon_1') in ['00:00:00','unknown','unavailable',''] }}"
            sequence:
              - action: input_datetime.set_datetime
                target:
                  entity_id: input_datetime.roborock_time_mon_1
                data:
                  time: "08:30:00"
        default: []
