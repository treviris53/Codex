# Version: 1.2.4
# Change: phase-5: override startup reconcile (timers restore-safe) (2026-01-21)
###############################################################################
# Home Assistant Package: Heizungssteuerung (Release-Version 1.1.0)
#
# Zweck
# - Fußbodenheizung mit hoher Trägheit: keine Nachtabsenkung, sondern Tagesprofil.
# - Absenkung nur bei längerer Abwesenheit (Default: 7 Tage), optional Urlaubsmodus.
# - Nutzung von Sonneneinstrahlung in der Übergangszeit über Tagesmaximum (TX).
# - Thermostate werden ausschließlich über Szenen angesteuert (OpenCCU-stabil).
#
# Profile
# - eco_17     -> Szene "Heizung 17°"  (Urlaub / lange Abwesenheit)  preset_mode: week_program_3
# - eco_19     -> Szene "Heizung 19°"  (Absenkung)                  preset_mode: week_program_3
# - komfort_21 -> Szene "Heizung 21°"  (Komfort)                    preset_mode: week_program_1
###############################################################################

input_boolean:
  heizung_automatik:
    name: Heizungsautomatik
    icon: mdi:radiator
  heizung_debug:
    name: Heizungsdebug (Logbook)
    icon: mdi:bug
  heizung_urlaub:
    name: Heizung Urlaub
    icon: mdi:airplane
  heizung_override:
    name: Heizung Override (manuell erkannt)
    icon: mdi:hand
timer:
  heizung_override:
    name: Heizung Override
    icon: mdi:timer-outline
    duration: "02:00:00"

input_number:
  heizung_temperatur_sommer:
    name: Sommer-Schwellwert (Vorhersage TX)
    min: 10
    max: 26
    step: 0.5
    unit_of_measurement: °C
    mode: slider
    icon: mdi:thermometer
    #initial: 16
  heizung_abwesenheit_stunden:
    name: Abwesenheitsschwelle
    icon: mdi:timer
    min: 24
    max: 504
    step: 24
    unit_of_measurement: h
    #initial: 168
input_select:
  heizung_aktives_profil:
    name: Heizungsprofil aktiv
    options:
    - unbekannt
    - eco_17
    - eco_19
    - komfort_21
    initial: unbekannt
    icon: mdi:home-thermometer
template:
  - triggers:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: input_boolean.anwesend
      - trigger: time_pattern
        minutes: "/10"
    binary_sensor:
      - name: Anwesend (stabil)
        unique_id: anwesend_stabil
        device_class: presence
        state: >-
          {% if is_state('input_boolean.anwesend','on') %}
            true
          {% else %}
            {% set hours = states('input_number.heizung_abwesenheit_stunden') | int(168) %}
            {% set since = states.input_boolean.anwesend.last_changed %}
            {{ (as_timestamp(now()) - as_timestamp(since)) < (hours * 3600) }}
          {% endif %}

  - sensor:
      - name: "Heizung Sollprofil"
        unique_id: heizung_sollprofil
        icon: mdi:thermostat-auto
        state: >-
          {% set urlaub = is_state('input_boolean.heizung_urlaub','on') %}
          {% set anwesend = is_state('binary_sensor.anwesend_stabil','on') %}
          {% set winter = is_state('binary_sensor.winterbetrieb_empfohlen','on') %}
          {% set tx = states('sensor.hamburg_fu_temp_next12h_max') | float(99) %}
          {% set t_sommer = states('input_number.heizung_temperatur_sommer') | float(16) %}

          {% if urlaub %}
            eco_17
          {% elif not anwesend %}
            eco_19
          {% elif winter %}
            komfort_21
          {% elif tx < t_sommer %}
            komfort_21
          {% else %}
            eco_19
          {% endif %}
        attributes:
          grund: >-
            {% set urlaub = is_state('input_boolean.heizung_urlaub','on') %}
            {% set anwesend = is_state('binary_sensor.anwesend_stabil','on') %}
            {% set winter = is_state('binary_sensor.winterbetrieb_empfohlen','on') %}
            {% set tx = states('sensor.hamburg_fu_temp_next12h_max') | float(99) %}
            {% set t_sommer = states('input_number.heizung_temperatur_sommer') | float(16) %}

            {% if urlaub %}
              urlaub_aktiv
            {% elif not anwesend %}
              abwesenheit_lang
            {% elif winter %}
              winterbetrieb_empfohlen
            {% elif tx < t_sommer %}
              tx_unter_sommer_schwelle
            {% else %}
              tx_ueber_sommer_schwelle
            {% endif %}

          decision_chain: >-
            {% set urlaub = is_state('input_boolean.heizung_urlaub','on') %}
            {% set anwesend = is_state('binary_sensor.anwesend_stabil','on') %}
            {% set winter = is_state('binary_sensor.winterbetrieb_empfohlen','on') %}
            {% set tx = states('sensor.hamburg_fu_temp_next12h_max') | float(99) %}
            {% set t_sommer = states('input_number.heizung_temperatur_sommer') | float(16) %}
            {% if urlaub %}
              Urlaub → eco_17
            {% elif not anwesend %}
              Abwesenheit lang → eco_19
            {% elif winter %}
              Winterbetrieb empfohlen → komfort_21
            {% elif tx < t_sommer %}
              Tagesmax {{ tx }}°C < {{ t_sommer }}°C → komfort_21
            {% else %}
              Tagesmax {{ tx }}°C ≥ {{ t_sommer }}°C → eco_19
            {% endif %}

          urlaub: "{{ 'on' if is_state('input_boolean.heizung_urlaub','on') else 'off' }}"
          anwesend_stabil: "{{ 'on' if is_state('binary_sensor.anwesend_stabil','on') else 'off' }}"
          winterbetrieb_empfohlen: "{{ 'on' if is_state('binary_sensor.winterbetrieb_empfohlen','on') else 'off' }}"
          tx_dwd: "{{ states('sensor.hamburg_fu_temp_next12h_max') }}"
          sommer_schwellwert: "{{ states('input_number.heizung_temperatur_sommer') }}"
          automatik_enabled: "{{ 'on' if is_state('input_boolean.heizung_automatik','on') else 'off' }}"
          debug_enabled: "{{ 'on' if is_state('input_boolean.heizung_debug','on') else 'off' }}"
          last_profile: "{{ states('input_select.heizung_aktives_profil') }}"

          last_profile_change_local: >-
            {% set ts = as_timestamp(states.input_select.heizung_aktives_profil.last_changed, default=none) %}
            {{ ts | timestamp_custom('%Y-%m-%d %H:%M:%S', True) if ts is not none else 'unknown' }}

          last_applied_local: >-
            {% set ts = as_timestamp(states('input_datetime.heizung_last_applied'), default=none) %}
            {{ ts | timestamp_custom('%Y-%m-%d %H:%M:%S', True) if ts is not none else 'unknown' }}

          last_action_text: "{{ states('input_text.heizung_last_action') }}"
          last_scene: "{{ states('input_text.heizung_last_scene') }}"

          now_local: >-
            {{ now().strftime('%Y-%m-%d %H:%M:%S') }}

  - binary_sensor:
      - name: Heizung Gäste Fenster offen
        unique_id: heizung_gaste_fenster_offen
        device_class: window
        state: "{{ is_state('binary_sensor.gaste_fenster_kontakt','on') }}"
        attributes:
          source: binary_sensor.gaste_fenster_kontakt
          source_state: "{{ states('binary_sensor.gaste_fenster_kontakt') }}"
script:
  heizung_profil_anwenden_pkg:
    alias: 'Heizung: Profil anwenden (über Szenen)'
    mode: queued
    max: 5
    fields:
      profil:
        description: eco_17, eco_19 oder komfort_21 (optional; sonst sensor.heizung_sollprofil)
        example: komfort_21
    variables:
      profil_effektiv: '{{ profil | default(states(''sensor.heizung_sollprofil''))
        }}'
      scene_eco: "{% if states('scene.heizung_19deg') != 'unavailable' %}\n  scene.heizung_19deg\n\
        {% elif states('scene.heizung_19deg_2') != 'unavailable' %}\n  scene.heizung_19deg_2\n\
        {% else %}\n  scene.heizung_19deg\n{% endif %}"
      scene_komfort: "{% if states('scene.heizung_21deg') != 'unavailable' %}\n  scene.heizung_21deg\n\
        {% elif states('scene.heizung_21deg_2') != 'unavailable' %}\n  scene.heizung_21deg_2\n\
        {% else %}\n  scene.heizung_21deg\n{% endif %}"
      tx: '{{ states(''sensor.hamburg_fu_temp_next12h_max'') }}'
      sommer: '{{ states(''input_number.heizung_temperatur_sommer'') }}'
      winter: '{{ states(''binary_sensor.winterbetrieb_empfohlen'') }}'
      anwesend: '{{ states(''binary_sensor.anwesend_stabil'') }}'
      grund: '{{ state_attr(''sensor.heizung_sollprofil'',''grund'') }}'
      scene_urlaub: "{%- if states('scene.heizung_17deg') != 'unavailable' -%}\n \
        \ scene.heizung_17deg\n{%- elif states('scene.heizung_17deg_2') != 'unavailable'\
        \ -%}\n  scene.heizung_17deg_2\n{%- else -%}\n  scene.heizung_17deg\n{%- endif\
        \ -%}"
    sequence:
      - condition: state
        entity_id: input_boolean.heizung_override
        state: 'off'
      - condition: state
        entity_id: input_boolean.heizung_automatik
        state: 'on'
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ profil_effektiv == 'eco_17' }}"
            sequence:
              - condition: template
                value_template: "{{ states(scene_urlaub) != 'unavailable' }}"
              - action: scene.turn_on
                target:
                  entity_id: "{{ scene_urlaub }}"
              - action: input_select.select_option
                data:
                  entity_id: input_select.heizung_aktives_profil
                  option: eco_17
              - action: input_datetime.set_datetime
                data:
                  entity_id: input_datetime.heizung_last_applied
                  timestamp: "{{ now().timestamp() }}"
              - action: input_text.set_value
                data:
                  entity_id: input_text.heizung_last_action
                  value: "{{ now().strftime('%Y-%m-%d %H:%M') }} → eco_17 ({{ grund }})"
              - action: input_text.set_value
                data:
                  entity_id: input_text.heizung_last_scene
                  value: "{{ scene_urlaub }}"
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.heizung_debug
                        state: 'on'
                    sequence:
                      - action: logbook.log
                        data:
                          name: Heizung
                          entity_id: sensor.heizung_sollprofil
                          message: "Profil eco_17 angewendet (Grund={{ grund }}, TX={{ tx }}, Sommer={{ sommer }}, Winterempf={{ winter }}, Anwesenheit={{ anwesend }}, Szene={{ scene_urlaub }})"

          - conditions:
              - condition: template
                value_template: "{{ profil_effektiv == 'eco_19' }}"
            sequence:
              - condition: template
                value_template: "{{ states(scene_eco) != 'unavailable' }}"
              - action: scene.turn_on
                target:
                  entity_id: "{{ scene_eco }}"
              - action: input_select.select_option
                data:
                  entity_id: input_select.heizung_aktives_profil
                  option: eco_19
              - action: input_datetime.set_datetime
                data:
                  entity_id: input_datetime.heizung_last_applied
                  timestamp: "{{ now().timestamp() }}"
              - action: input_text.set_value
                data:
                  entity_id: input_text.heizung_last_action
                  value: "{{ now().strftime('%Y-%m-%d %H:%M') }} → eco_19 ({{ grund }})"
              - action: input_text.set_value
                data:
                  entity_id: input_text.heizung_last_scene
                  value: "{{ scene_eco }}"
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.heizung_debug
                        state: 'on'
                    sequence:
                      - action: logbook.log
                        data:
                          name: Heizung
                          entity_id: sensor.heizung_sollprofil
                          message: "Profil eco_19 angewendet (Grund={{ grund }}, TX={{ tx }}, Sommer={{ sommer }}, Winterempf={{ winter }}, Anwesenheit={{ anwesend }}, Szene={{ scene_eco }})"

          - conditions:
              - condition: template
                value_template: "{{ profil_effektiv == 'komfort_21' }}"
            sequence:
              - condition: template
                value_template: "{{ states(scene_komfort) != 'unavailable' }}"
              - action: scene.turn_on
                target:
                  entity_id: "{{ scene_komfort }}"
              - action: input_select.select_option
                data:
                  entity_id: input_select.heizung_aktives_profil
                  option: komfort_21
              - action: input_datetime.set_datetime
                data:
                  entity_id: input_datetime.heizung_last_applied
                  timestamp: "{{ now().timestamp() }}"
              - action: input_text.set_value
                data:
                  entity_id: input_text.heizung_last_action
                  value: "{{ now().strftime('%Y-%m-%d %H:%M') }} → komfort_21 ({{ grund }})"
              - action: input_text.set_value
                data:
                  entity_id: input_text.heizung_last_scene
                  value: "{{ scene_komfort }}"
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.heizung_debug
                        state: 'on'
                    sequence:
                      - action: logbook.log
                        data:
                          name: Heizung
                          entity_id: sensor.heizung_sollprofil
                          message: "Profil komfort_21 angewendet (Grund={{ grund }}, TX={{ tx }}, Sommer={{ sommer }}, Winterempf={{ winter }}, Anwesenheit={{ anwesend }}, Szene={{ scene_komfort }})"
automation:
- id: heizung_sollprofil_sync
  alias: 'Heizung: Sollprofil -> Szene anwenden'
  mode: restart
  trigger:
    # Re-Apply kurz nach Mitternacht (HmIP kann um 00:00 auf Defaultwerte zurückfallen)
    - platform: time
      at: "00:01:00"
    - platform: time
      at: "04:03:00"
    - platform: state
      entity_id: binary_sensor.anwesend_stabil
    - platform: state
      entity_id: input_boolean.heizung_urlaub
    - platform: homeassistant
      event: start
  condition:
    - condition: state
      entity_id: input_boolean.heizung_automatik
      state: 'on'
    - condition: state
      entity_id: input_boolean.heizung_override
      state: 'off'
    - condition: template
      value_template: "{{ states('sensor.heizung_sollprofil') in ['eco_17','eco_19','komfort_21'] }}"
  action:
    # Nach HA-Start kurz warten, bis alle Sensoren/States stabil sind
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.platform == 'homeassistant' }}"
          sequence:
            - delay: "00:05:00"
    - service: script.heizung_profil_anwenden_pkg
      data:
        profil: "{{ states('sensor.heizung_sollprofil') }}"

- id: heizung_automatik_einschalten_sync
  alias: 'Heizung: Beim Einschalten der Automatik Sollprofil anwenden'
  mode: restart
  trigger:
    - platform: state
      entity_id: input_boolean.heizung_automatik
      to: 'on'
  action:
    - condition: state
      entity_id: input_boolean.heizung_override
      state: 'off'
    - service: script.heizung_profil_anwenden_pkg
      data:
        profil: "{{ states('sensor.heizung_sollprofil') }}"

  ###########################################################################
  # Phase-5: Manual Override (Auto-Detect)
  # - Erkennt manuelle Änderungen an den Heizungs-Climates und pausiert
  #   die Profil-Automatik für 2h (Timer), ohne Setpoints aktiv zu ändern.
  ###########################################################################
- id: heizung_override_timer_start
  alias: "Heizung Override: Timer starten"
  mode: restart
  trigger:
    - platform: state
      entity_id: input_boolean.heizung_override
      to: "on"
  action:
    - service: timer.start
      target:
        entity_id: timer.heizung_override

- id: heizung_override_timer_cancel
  alias: "Heizung Override: OFF -> Timer stoppen"
  mode: restart
  trigger:
    - platform: state
      entity_id: input_boolean.heizung_override
      to: "off"
  action:
    - service: timer.cancel
      target:
        entity_id: timer.heizung_override

- id: heizung_override_timer_finished
  alias: "Heizung Override: Ablauf -> Sollprofil anwenden"
  mode: restart
  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.heizung_override
  condition:
    - condition: state
      entity_id: input_boolean.heizung_automatik
      state: "on"
  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.heizung_override
    - service: script.heizung_profil_anwenden_pkg
      data:
        profil: "{{ states('sensor.heizung_sollprofil') }}"

- id: heizung_override_auto_detect
  alias: "Heizung: Manuelle Bedienung erkannt -> Override"
  mode: restart
  trigger:
    - platform: state
      entity_id:
        - climate.flur_wandthermostat
        - climate.gaste_wandthermostat
        - climate.gastebad_wandthermostat
        - climate.kuche_wandthermostat
        - climate.schlazi_wandthermostat
        - climate.wohnzimmer_wandthermostat
        - climate.bad_wandthermostat
        - climate.wohnraum_flur_int0000004
      attribute: temperature
      for: "00:00:05"
    - platform: state
      entity_id:
        - climate.flur_wandthermostat
        - climate.gaste_wandthermostat
        - climate.gastebad_wandthermostat
        - climate.kuche_wandthermostat
        - climate.schlazi_wandthermostat
        - climate.wohnzimmer_wandthermostat
      attribute: preset_mode
      for: "00:00:05"
    - platform: state
      entity_id:
        - climate.flur_wandthermostat
        - climate.gaste_wandthermostat
        - climate.gastebad_wandthermostat
        - climate.kuche_wandthermostat
        - climate.schlazi_wandthermostat
        - climate.wohnzimmer_wandthermostat
      for: "00:00:05"
  condition:
    - condition: state
      entity_id: input_boolean.heizung_automatik
      state: "on"
    - condition: state
      entity_id: input_boolean.heizung_override
      state: "off"
    - condition: template
      value_template: >-
        {% set last = as_timestamp(states('input_datetime.heizung_last_applied'), default=0) | float(0) %}
        {% set age = (now().timestamp() - last) if last > 0 else 999999 %}
        {% set fromv = (trigger.from_state.attributes.get(trigger.attribute) if trigger.attribute else trigger.from_state.state) if trigger.from_state else none %}
        {% set tov = (trigger.to_state.attributes.get(trigger.attribute) if trigger.attribute else trigger.to_state.state) if trigger.to_state else none %}
        {{ (tov is not none) and (fromv is not none) and (tov != fromv) and (age > 120) }}
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.heizung_override


# Phase-5: Reconcile Override nach Neustart (Timer wird nicht zuverlässig restauriert)
- id: heizung_override_startup_reconcile
  alias: "Heizung Override: Reconcile beim Start"
  mode: single
  trigger:
    - platform: homeassistant
      event: start
  action:
    - delay: "00:00:30"
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.heizung_override
              state: "on"
            - condition: template
              value_template: "{{ states('timer.heizung_override') != 'active' }}"
          sequence:
            - service: timer.start
              target:
                entity_id: timer.heizung_override
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.heizung_override
              state: "off"
            - condition: template
              value_template: "{{ states('timer.heizung_override') == 'active' }}"
          sequence:
            - service: timer.cancel
              target:
                entity_id: timer.heizung_override

