# Version: 2.0.0
# Change note (2026-03-19): Debug sensors derive from the centralized target-position logic and no longer duplicate decisions.
template:
  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - input_boolean.rollladen_automation_enabled
          - sensor.rollladen_ost_target_position
          - sensor.rollladen_west_target_position
          - sensor.rollladen_nord_target_position
    sensor:
      - name: "Rollladen Ost Debug"
        unique_id: rollladen_ost_debug
        icon: mdi:bug-outline
        state: >-
          {% if not is_state('input_boolean.rollladen_automation_enabled','on') %}
            disabled
          {% else %}
            {{ states('sensor.rollladen_ost_target_position') }}
          {% endif %}
        attributes:
          reason: >-
            {% if not is_state('input_boolean.rollladen_automation_enabled','on') %}
              master_disabled
            {% else %}
              {{ state_attr('sensor.rollladen_ost_target_position','reason') }}
            {% endif %}
          master_enabled: "{{ is_state('input_boolean.rollladen_automation_enabled','on') }}"
          day_window: "{{ state_attr('sensor.rollladen_ost_target_position','day_window') }}"
          shade: "{{ state_attr('sensor.rollladen_ost_target_position','shade') }}"
          door_state: "{{ state_attr('sensor.rollladen_ost_target_position','door_state') }}"
          plug_on: "{{ state_attr('sensor.rollladen_ost_target_position','plug_on') }}"
          latest_close: "{{ state_attr('sensor.rollladen_ost_target_position','latest_close') }}"
          plug_open_start: "{{ state_attr('sensor.rollladen_ost_target_position','plug_open_start') }}"
          plug_open_end: "{{ state_attr('sensor.rollladen_ost_target_position','plug_open_end') }}"

      - name: "Rollladen West Debug"
        unique_id: rollladen_west_debug
        icon: mdi:bug-outline
        state: >-
          {% if not is_state('input_boolean.rollladen_automation_enabled','on') %}
            disabled
          {% else %}
            {{ states('sensor.rollladen_west_target_position') }}
          {% endif %}
        attributes:
          reason: >-
            {% if not is_state('input_boolean.rollladen_automation_enabled','on') %}
              master_disabled
            {% else %}
              {{ state_attr('sensor.rollladen_west_target_position','reason') }}
            {% endif %}
          master_enabled: "{{ is_state('input_boolean.rollladen_automation_enabled','on') }}"
          day_window: "{{ state_attr('sensor.rollladen_west_target_position','day_window') }}"
          shade: "{{ state_attr('sensor.rollladen_west_target_position','shade') }}"

      - name: "Rollladen Nord Debug"
        unique_id: rollladen_nord_debug
        icon: mdi:bug-outline
        state: >-
          {% if not is_state('input_boolean.rollladen_automation_enabled','on') %}
            disabled
          {% else %}
            {{ states('sensor.rollladen_nord_target_position') }}
          {% endif %}
        attributes:
          reason: >-
            {% if not is_state('input_boolean.rollladen_automation_enabled','on') %}
              master_disabled
            {% else %}
              {{ state_attr('sensor.rollladen_nord_target_position','reason') }}
            {% endif %}
          master_enabled: "{{ is_state('input_boolean.rollladen_automation_enabled','on') }}"
          day_window: "{{ state_attr('sensor.rollladen_nord_target_position','day_window') }}"
