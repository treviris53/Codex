# Version: 2.0.1
# Change note (2026-03-19): Centralize rolladen target-position logic in one place and let scripts/debug derive from it.
# Ownership: Diese Datei ist die autoritative Zielpositions- und
# Zeitfenster-Ebene. Core-Automationen triggern nur Apply-Skripte; die Skripte
# lesen ausschliesslich diese Sensoren und treffen selbst keine Fahrentscheidung.
###############################################################################
# Zeitfensterberechnung + zentrale Zielpositionslogik
###############################################################################
template:
  - sensor:
      - name: Rollladen Open TS
        unique_id: rollladen_open_ts
        device_class: timestamp
        state: >
          {% set eo = states('input_datetime.rollladen_earliest_open') %}
          {% set earliest_open = today_at(eo if eo not in ['unknown','unavailable',''] else '06:00:00') %}
          {% set lo = states('input_datetime.rollladen_latest_open') %}
          {% set latest_open = today_at(lo if lo not in ['unknown','unavailable',''] else '08:00:00') %}
          {% set offset_m = states('input_number.rollladen_offset_morgen_min') | int(0) %}

          {% set nr = as_local(as_datetime(state_attr('sun.sun','next_rising'))) %}
          {% if nr %}
            {% set sunrise_today = nr if nr.date() == now().date() else (nr - timedelta(days=1)) %}
          {% else %}
            {% set sunrise_today = earliest_open %}
          {% endif %}

          {% set open_raw = sunrise_today + timedelta(minutes=offset_m) %}
          {% set open_clamped = open_raw %}
          {% if open_clamped < earliest_open %}{% set open_clamped = earliest_open %}{% endif %}
          {% if open_clamped > latest_open %}{% set open_clamped = latest_open %}{% endif %}
          {{ open_clamped.isoformat() }}

      - name: Rollladen Close TS
        unique_id: rollladen_close_ts
        device_class: timestamp
        state: >
          {% set lc = states('input_datetime.rollladen_latest_close') %}
          {% set latest_close = today_at(lc if lc not in ['unknown','unavailable',''] else '23:00:00') %}
          {% set offset_a = states('input_number.rollladen_offset_abend_min') | int(0) %}

          {% set ns = as_local(as_datetime(state_attr('sun.sun','next_setting'))) %}
          {% if ns %}
            {% set sunset_today = ns if ns.date() == now().date() else (ns - timedelta(days=1)) %}
          {% else %}
            {% set sunset_today = latest_close %}
          {% endif %}

          {% set close_raw = sunset_today + timedelta(minutes=offset_a) %}
          {% set close_capped = close_raw if close_raw <= latest_close else latest_close %}
          {{ close_capped.isoformat() }}

    binary_sensor:
      - name: Rollladen Day Window
        unique_id: rollladen_day_window
        device_class: running
        state: >
          {% set o = as_timestamp(states('sensor.rollladen_open_ts'), default=none) %}
          {% set c = as_timestamp(states('sensor.rollladen_close_ts'), default=none) %}
          {% set n = as_timestamp(now()) %}
          {{ o is not none and c is not none and n >= o and n < c }}

  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - binary_sensor.rollladen_day_window
          - input_boolean.beschattung_ost
          - input_boolean.beschattung_west
          - binary_sensor.kuche_balkon_turkontakt
          - switch.schalt_mess_steckdose_steckdose
          - input_datetime.rollladen_latest_close
          - input_datetime.rollladen_ost_plug_open_start
          - input_datetime.rollladen_ost_plug_open_end
      - platform: time
        at: input_datetime.rollladen_latest_close
      - platform: time
        at: input_datetime.rollladen_ost_plug_open_start
      - platform: time
        at: input_datetime.rollladen_ost_plug_open_end
    sensor:
      # OST/WEST konsumieren nur die signalisierten Beschattungs-Outputs.
      - name: Rollladen Ost Target Position
        unique_id: rollladen_ost_target_position
        unit_of_measurement: "%"
        icon: mdi:target
        state: >-
          {% set day = is_state('binary_sensor.rollladen_day_window','on') %}
          {% set shade = is_state('input_boolean.beschattung_ost','on') %}
          {% set door_state = states('binary_sensor.kuche_balkon_turkontakt') %}
          {% set door_failsafe = door_state in ['on','unknown','unavailable'] %}
          {% set plug_on = is_state('switch.schalt_mess_steckdose_steckdose','on') %}
          {% set latest_close_raw = states('input_datetime.rollladen_latest_close') %}
          {% set latest_close = latest_close_raw if latest_close_raw not in ['unknown','unavailable',''] else '23:00:00' %}
          {% set before_latest_close = now() < today_at(latest_close) %}
          {% set plug_start_raw = states('input_datetime.rollladen_ost_plug_open_start') %}
          {% set plug_start = plug_start_raw if plug_start_raw not in ['unknown','unavailable',''] else '05:00:00' %}
          {% set plug_end_raw = states('input_datetime.rollladen_ost_plug_open_end') %}
          {% set plug_end = plug_end_raw if plug_end_raw not in ['unknown','unavailable',''] else '09:00:00' %}
          {% set in_plug_window = now() >= today_at(plug_start) and now() < today_at(plug_end) %}
          {% set morning_hold = plug_on and in_plug_window %}
          {% set evening_hold = (not day) and plug_on and before_latest_close %}
          {% if door_failsafe %}
            100
          {% elif morning_hold %}
            100
          {% elif evening_hold %}
            100
          {% elif not day %}
            0
          {% elif shade %}
            33
          {% else %}
            100
          {% endif %}
        attributes:
          reason: >-
            {% set day = is_state('binary_sensor.rollladen_day_window','on') %}
            {% set shade = is_state('input_boolean.beschattung_ost','on') %}
            {% set door_state = states('binary_sensor.kuche_balkon_turkontakt') %}
            {% set door_failsafe = door_state in ['on','unknown','unavailable'] %}
            {% set plug_on = is_state('switch.schalt_mess_steckdose_steckdose','on') %}
            {% set latest_close_raw = states('input_datetime.rollladen_latest_close') %}
            {% set latest_close = latest_close_raw if latest_close_raw not in ['unknown','unavailable',''] else '23:00:00' %}
            {% set before_latest_close = now() < today_at(latest_close) %}
            {% set plug_start_raw = states('input_datetime.rollladen_ost_plug_open_start') %}
            {% set plug_start = plug_start_raw if plug_start_raw not in ['unknown','unavailable',''] else '05:00:00' %}
            {% set plug_end_raw = states('input_datetime.rollladen_ost_plug_open_end') %}
            {% set plug_end = plug_end_raw if plug_end_raw not in ['unknown','unavailable',''] else '09:00:00' %}
            {% set in_plug_window = now() >= today_at(plug_start) and now() < today_at(plug_end) %}
            {% set morning_hold = plug_on and in_plug_window %}
            {% set evening_hold = (not day) and plug_on and before_latest_close %}
            {% if door_failsafe %}
              door_failsafe
            {% elif morning_hold %}
              plug_morning_window
            {% elif evening_hold %}
              plug_evening_hold_until_latest_close
            {% elif not day %}
              outside_day_window
            {% elif shade %}
              shading
            {% else %}
              default_open
            {% endif %}
          day_window: "{{ is_state('binary_sensor.rollladen_day_window','on') }}"
          shade: "{{ is_state('input_boolean.beschattung_ost','on') }}"
          door_state: "{{ states('binary_sensor.kuche_balkon_turkontakt') }}"
          plug_on: "{{ is_state('switch.schalt_mess_steckdose_steckdose','on') }}"
          latest_close: >-
            {% set latest_close_raw = states('input_datetime.rollladen_latest_close') %}
            {{ latest_close_raw if latest_close_raw not in ['unknown','unavailable',''] else '23:00:00' }}
          plug_open_start: >-
            {% set plug_start_raw = states('input_datetime.rollladen_ost_plug_open_start') %}
            {{ plug_start_raw if plug_start_raw not in ['unknown','unavailable',''] else '05:00:00' }}
          plug_open_end: >-
            {% set plug_end_raw = states('input_datetime.rollladen_ost_plug_open_end') %}
            {{ plug_end_raw if plug_end_raw not in ['unknown','unavailable',''] else '09:00:00' }}

      - name: Rollladen West Target Position
        unique_id: rollladen_west_target_position
        unit_of_measurement: "%"
        icon: mdi:target
        state: >-
          {% set day = is_state('binary_sensor.rollladen_day_window','on') %}
          {% set shade = is_state('input_boolean.beschattung_west','on') %}
          {% if not day %}
            0
          {% elif shade %}
            33
          {% else %}
            100
          {% endif %}
        attributes:
          reason: >-
            {% set day = is_state('binary_sensor.rollladen_day_window','on') %}
            {% set shade = is_state('input_boolean.beschattung_west','on') %}
            {% if not day %}
              outside_day_window
            {% elif shade %}
              shading
            {% else %}
              default_open
            {% endif %}
          day_window: "{{ is_state('binary_sensor.rollladen_day_window','on') }}"
          shade: "{{ is_state('input_boolean.beschattung_west','on') }}"

      # NORD ist bewusst asymmetrisch zum Ost/West-Pfad und folgt aktuell nur
      # dem Day-Window; kein Beschattungs- oder manueller Override-Sonderpfad.
      - name: Rollladen Nord Target Position
        unique_id: rollladen_nord_target_position
        unit_of_measurement: "%"
        icon: mdi:target
        state: >-
          {% if is_state('binary_sensor.rollladen_day_window','on') %}
            100
          {% else %}
            0
          {% endif %}
        attributes:
          reason: >-
            {% if is_state('binary_sensor.rollladen_day_window','on') %}
              default_open
            {% else %}
              outside_day_window
            {% endif %}
          day_window: "{{ is_state('binary_sensor.rollladen_day_window','on') }}"
