esphome:
  name: esphome-web-398629
  friendly_name: ESPHome-Bluetooth-Gast
  min_version: 2024.11.0
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "ESPHome-Bluetooth-Gast-WIFI"
    password: "GLAiXXOkO0L1"

esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

web_server:
  port: 80
