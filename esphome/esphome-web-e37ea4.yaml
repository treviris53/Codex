esphome:
  name: esphome-web-e37ea4
  friendly_name: Temperatur_Sensor
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

sensor:
  - platform: dht
    model: DHT11
    pin: GPIO4
    temperature:
      name: "Temperatur DHT11"
      accuracy_decimals: 1
    humidity:
      name: "Luftfeuchte DHT11"
      accuracy_decimals: 0
    update_interval: 30s