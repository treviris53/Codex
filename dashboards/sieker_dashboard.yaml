              - entity: input_boolean.beschattung_west
                name: Beschattung West
              - entity: binary_sensor.kuche_balkon_turkontakt
                name: Türkontakt
      - cards:
          - type: heading
            heading: Debug
          - type: entities
            title: Debug Ost
            show_header_toggle: false
            entities:
              - entity: sensor.rollladen_ost_debug
                name: Ost Debug
          - type: entities
            title: Debug West
            show_header_toggle: false
            entities:
              - entity: sensor.rollladen_west_debug
                name: West Debug
          - type: entities
            title: Debug Nord
            show_header_toggle: false
            entities:
              - entity: sensor.rollladen_nord_debug
                name: Nord Debug
