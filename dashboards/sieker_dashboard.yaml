              - entity: switch.schalt_mess_steckdose_steckdose
              - entity: input_boolean.beschattung_ost
              - entity: input_boolean.beschattung_west
              - entity: binary_sensor.kuche_balkon_turkontakt
  - title: Service
    path: rollladen-service
    icon: mdi:tools
    subview: true
    type: sections
    max_columns: 3
    sections:
      - cards:
          - type: heading
            heading: Direkte Bedienung
          - type: tile
            entity: cover.rollladen_ost
            name: Rollladen Ost
            features:
              - type: cover-position
          - type: tile
            entity: cover.rollladen_west
            name: Rollladen West
            features:
              - type: cover-position
          - type: tile
            entity: cover.rollladen_nord
            name: Rollladen Nord
            features:
              - type: cover-position
      - cards:
          - type: heading
            heading: Policies (UI-Helper)
          - type: entities
            title: Zeitregeln
            show_header_toggle: false
            entities:
              - entity: input_datetime.rollladen_earliest_open
              - entity: input_datetime.rollladen_latest_open
              - entity: input_datetime.rollladen_latest_close
              - entity: input_datetime.rollladen_ost_plug_open_start
              - entity: input_datetime.rollladen_ost_plug_open_end
          - type: entities
            title: Offsets
            show_header_toggle: false
            entities:
