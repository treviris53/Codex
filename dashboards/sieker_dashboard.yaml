# Dashboard: Sieker Übersicht
# Version: 1.1.0
# Generated: 2026-01-28
# Notes:
# - Lovelace YAML exported from UI (Storage dashboards remove comments); comments were re-added for Git readability.
# - Editing in UI "Raw configuration editor" will strip comments again; prefer editing the file in Git/Editor.
views:
  - path: default_view
    title: Home
    cards: []
    type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Küche
            heading_style: title
            badges:
              - type: entity
                entity: sensor.kuche_wandthermostat_luftfeuchtigkeit
              - type: entity
                entity: sensor.kuche_wandthermostat_temperatur
              - type: entity
                entity: binary_sensor.kuche_balkon_turkontakt
            icon: mdi:fridge
          - type: tile
            entity: light.licht_herd
          - type: tile
            entity: light.0x086bd7fffe404a82
          - type: tile
            entity: cover.kuche_balkon_rollo
          - type: tile
            entity: cover.kuche_sieker_rollo
          - type: tile
            entity: climate.kuche_wandthermostat
      - type: grid
        cards:
          - type: heading
            heading: Wohnzimmer
            heading_style: title
            badges:
              - type: entity
                entity: sensor.wohnzimmer_wandthermostat_luftfeuchtigkeit
              - type: entity
                entity: sensor.wohnzimmer_wandthermostat_temperatur
              - type: entity
                entity: binary_sensor.wohnzimmer_turkontakt
          - type: tile
            entity: light.vitrinenlicht
          - type: tile
            entity: light.licht_wohnzimmer_haupt
          - type: tile
            entity: light.licht_fernseher
          - type: tile
            entity: switch.0xa4c138442a735c69
          - type: tile
            entity: climate.wohnzimmer_wandthermostat
      - type: grid
        cards:
          - type: heading
            heading: Schlafzimmer
            heading_style: title
            badges:
              - type: entity
                entity: sensor.schlazi_wandthermostat_luftfeuchtigkeit
              - type: entity
                entity: sensor.schlazi_wandthermostat_temperatur
              - type: entity
                entity: sensor.fritz_dect_repeater_100_temperatur
              - type: entity
                entity: sensor.lichtsensor_schlafzimmer_illuminance
          - type: tile
            entity: light.licht_schlafzimmer
          - type: tile
            entity: cover.schlazi_rollo
          - type: tile
            entity: climate.schlazi_wandthermostat
      - type: grid
        cards:
          - type: heading
            heading: Bad
            heading_style: title
            icon: mdi:bathtub
            badges:
              - type: entity
                entity: sensor.bad_wandthermostat_luftfeuchtigkeit
              - type: entity
                entity: sensor.bad_wandthermostat_temperatur
          - type: tile
            entity: climate.bad_wandthermostat
      - type: grid
        cards:
          - type: heading
            heading: Flur
            heading_style: title
            badges:
              - type: entity
                entity: sensor.flur_wandthermostat_luftfeuchtigkeit
              - type: entity
                entity: sensor.flur_wandthermostat_temperatur
          - type: tile
            entity: climate.flur_wandthermostat
      - type: grid
        cards:
          - type: heading
            heading: Gästebad
            heading_style: title
            badges:
              - type: entity
                entity: sensor.gastebad_wandthermostat_temperatur
              - type: entity
                entity: sensor.gastebad_wandthermostat_luftfeuchtigkeit
              - type: entity
                entity: sensor.0xa4c1384490e4e5ea_temperature
              - type: entity
                entity: sensor.0xa4c1384490e4e5ea_humidity
          - type: tile
            entity: cover.gaste_bad_rollo
          - type: tile
            entity: climate.gastebad_wandthermostat
      - type: grid
        cards:
          - type: heading
            heading: Gästezimmer
            heading_style: title
            badges:
              - type: entity
                entity: sensor.gaste_wandthermostat_luftfeuchtigkeit
              - type: entity
                entity: sensor.gaste_wandthermostat_temperatur
              - type: entity
                entity: binary_sensor.gaste_fenster_kontakt
          - type: tile
            entity: cover.gaste_heck_rollo
          - type: tile
            entity: cover.gaste_sieker_rollo
          - type: tile
            entity: climate.gaste_wandthermostat
      - type: grid
        cards:
          - type: heading
            heading: Balkon
            heading_style: title
            badges:
              - type: entity
                entity: sensor.0x00158d008b61ad80_temperature
              - type: entity
                entity: sensor.0x00158d008b61ad80_humidity
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.0x00158d008b61ad80_pressure
              - type: entity
                entity: sensor.balkon_lichtsensor_beleuchtungsstarke
          - type: tile
            entity: switch.schalt_mess_steckdose_steckdose
          - type: tile
            entity: input_boolean.steckdose_show_button
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Subviews
            heading_style: title
            icon: mdi:view-dashboard
            grid_options:
              columns: full
              rows: 1
          - type: button
            name: Heizung
            icon: mdi:radiator
            tap_action:
              action: navigate
              navigation_path: heizung
          - type: button
            name: Rollladen
            icon: mdi:window-shutter
            tap_action:
              action: navigate
              navigation_path: rollladen
          - show_name: true
            show_icon: true
            type: button
            name: Steckdose Balkon
            icon: mdi:power-socket-de
            tap_action:
              action: navigate
              navigation_path: steckdose-balkon
            grid_options:
              columns: 6
              rows: 2
            visibility:
              - condition: or
                conditions:
                  - condition: state
                    entity: binary_sensor.steckdose_saison_aktiv
                    state: 'on'
                  - condition: state
                    entity: input_boolean.steckdose_show_button
                    state: 'on'
          - type: custom:button-card
            entity: sensor.eaton_3s850d_statusdaten
            name: USV
            icon: mdi:generator-mobile
            show_name: true
            show_icon: true
            grid_options:
              columns: 6
              rows: 2
            styles:
              icon:
                - color: var(--state-icon-color)
            tap_action:
              action: navigate
              navigation_path: usv
            color_type: card
            state:
              - operator: '!='
                value: OL
                color: red
                styles:
                  icon:
                    - color: white
                  name:
                    - color: white
      - type: grid
        cards:
          - type: heading
            heading: Keller
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.waschmaschine_maschinenzustand
              - type: entity
                entity: sensor.waschmaschine_fertigstellungszeit
            grid_options:
              columns: 12
              rows: 1
          - type: tile
            entity: switch.waschmaschine_bubble_soak
            color: amber
            vertical: false
            features_position: bottom
          - type: tile
            entity: select.waschmaschine_dosiermenge_fur_waschmittel
          - type: tile
            entity: select.waschmaschine_schleuderstufe
          - type: tile
            entity: number.waschmaschine_spulgange
        column_span: 1
      - type: grid
        cards:
          - type: heading
            heading: Kontrollraum
            heading_style: title
            badges:
              - type: entity
                entity: sensor.0xa4c13838e02b32cf_energy
              - type: entity
                entity: sensor.0xa4c13838e02b32cf_power
          - type: tile
            entity: switch.0xa4c13838e02b32cf
    max_columns: 4
    icon: mdi:home
  - title: Steuerung
    path: heizung
    icon: mdi:radiator
    type: sections
    max_columns: 3
    sections:
      - cards:
          - type: heading
            heading: Betrieb
          - type: entities
            title: Hauptschalter & Modi
            show_header_toggle: false
            entities:
              - entity: input_boolean.heizung_automatik
                name: Heizungsautomatik
              - entity: input_boolean.heizung_urlaub
                name: Urlaubsmodus (2–3 Wochen)
              - entity: input_boolean.heizung_debug
                name: Debug-Logging (Logbook)
              - entity: input_select.heizung_aktives_profil
                name: Aktives Profil
              - entity: input_boolean.heizung_override
                name: Heizung Override
              - entity: timer.heizung_override
                name: Override Timer
          - type: entities
            title: Stellschrauben
            show_header_toggle: false
            entities:
              - entity: input_number.heizung_abwesenheit_stunden
                name: Abwesenheitsschwelle (h)
              - entity: input_number.heizung_temperatur_sommer
                name: Sommer-Schwelle Tagesmax (°C)
          - type: button
            name: Debug-Übersicht öffnen
            icon: mdi:bug-outline
            tap_action:
              action: navigate
              navigation_path: heizung-debug
      - cards:
          - type: heading
            heading: Status
          - type: entities
            title: Entscheidungsinputs
            show_header_toggle: false
            entities:
              - entity: input_boolean.anwesend
                name: Anwesenheit (Quelle)
              - entity: binary_sensor.anwesend_stabil
                name: Anwesenheit stabil
              - entity: binary_sensor.winterbetrieb_empfohlen
                name: Winterbetrieb empfohlen
              - entity: sensor.hamburg_fu_temp_next12h_max
                name: Tagesmax (Vorhersage)
              - entity: sensor.season
                name: Saison
          - type: entities
            title: Sollprofil & Diagnose (Kurz)
            show_header_toggle: false
            entities:
              - entity: sensor.heizung_sollprofil
                name: Sollprofil (berechnet)
              - entity: input_datetime.heizung_last_applied
                name: Letzte Anwendung
              - entity: input_text.heizung_last_action
                name: Letzte Entscheidung
      - cards:
          - type: heading
            heading: Historie (24h)
          - type: history-graph
            title: Profil & Entscheidung (24h)
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.heizung_sollprofil
              - entity: input_select.heizung_aktives_profil
              - entity: binary_sensor.winterbetrieb_empfohlen
              - entity: binary_sensor.anwesend_stabil
              - entity: input_boolean.heizung_urlaub
          - type: history-graph
            title: Wetter / Saison (24h)
            hours_to_show: 24
            refresh_interval: 60
            entities:
              - entity: sensor.hamburg_fu_temp_next12h_max
              - entity: sensor.season
    subview: true
  - title: Debug
    path: heizung-debug
    icon: mdi:bug-outline
    subview: true
    type: sections
    max_columns: 3
    sections:
      - cards:
          - type: heading
            heading: Debug-Übersicht
          - type: entities
            title: Entscheidungen & Gründe
            show_header_toggle: false
            entities:
              - entity: sensor.heizung_sollprofil
                name: Sollprofil (State)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: grund
                name: Grund (Attribut)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: tx_dwd
                name: Tagesmax tx (Attribut)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: sommer_schwellwert
                name: Sommer-Schwelle (Attribut)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: winterbetrieb_empfohlen
                name: Winter empfohlen (Attribut)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: anwesend_stabil
                name: Anwesenheit stabil (Attribut)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: urlaub
                name: Urlaub (Attribut)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: tx_dwd
                name: Tagesmax DWD (Attribut)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: sommer_schwellwert
                name: Sommer-Schwellwert (Attribut)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: icon
                name: Icon (Attribut)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: friendly_name
                name: Friendly Name (Attribut)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: decision_chain
                name: Decision Chain
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: automatik_enabled
                name: Automatik enabled
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: debug_enabled
                name: Debug enabled
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: last_profile
                name: Last profile
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: last_profile_change_local
                name: Last profile change (local)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: last_applied_local
                name: Last applied (local)
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: last_scene
                name: Last scene
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: last_action_text
                name: Last action text
              - type: attribute
                entity: sensor.heizung_sollprofil
                attribute: now_local
                name: Now (local)
              - entity: input_text.heizung_last_action
                name: Letzte Entscheidung (Text)
              - entity: input_datetime.heizung_last_applied
                name: Letzte Anwendung
          - type: entities
            title: Eingänge (Rohwerte)
            show_header_toggle: false
            entities:
              - entity: input_boolean.heizung_automatik
              - entity: input_boolean.heizung_urlaub
              - entity: input_boolean.anwesend
              - entity: binary_sensor.anwesend_stabil
              - entity: binary_sensor.winterbetrieb_empfohlen
              - entity: sensor.hamburg_fu_temp_next12h_max
              - entity: sensor.aussentemperatur_mittel_24h
              - entity: sensor.aussentemperatur_mittel_72h
              - entity: sensor.season
      - cards:
          - type: heading
            heading: Service
          - type: entities
            title: Aktionen (manuell)
            show_header_toggle: false
            entities:
              - entity: script.heizung_profil_anwenden_pkg
                name: Profil jetzt anwenden
          - type: entities
            title: Grenzwerte / Policies
            show_header_toggle: false
            entities:
              - entity: input_number.heizung_abwesenheit_stunden
              - entity: input_number.heizung_temperatur_sommer
      - cards:
          - type: heading
            heading: Historie (7 Tage)
          - type: history-graph
            title: Profilwechsel (7 Tage)
            hours_to_show: 168
            refresh_interval: 300
            entities:
              - entity: sensor.heizung_sollprofil
              - entity: input_select.heizung_aktives_profil
              - entity: input_boolean.heizung_urlaub
              - entity: binary_sensor.winterbetrieb_empfohlen
              - entity: binary_sensor.anwesend_stabil
  - title: Rollladen
    path: rollladen
    icon: mdi:window-shutter
    type: sections
    max_columns: 3
    sections:
      - cards:
          - type: heading
            heading: Steuerung
          - type: entities
            title: Automatik
            show_header_toggle: false
            entities:
              - entity: input_boolean.rollladen_automation_enabled
                name: Rollladen Automatik
              - entity: binary_sensor.rollladen_day_window
                name: Day Window
          - type: entities
            title: Overrides
            show_header_toggle: false
            entities:
              - entity: input_boolean.rollladen_override_ost
                name: Override Ost
              - entity: timer.rollladen_override_ost
                name: Override Timer Ost
              - entity: input_boolean.rollladen_override_west
                name: Override West
              - entity: timer.rollladen_override_west
                name: Override Timer West
          - type: grid
            columns: 3
            square: false
            cards:
              - type: button
                name: Diagnose
                icon: mdi:bug-outline
                tap_action:
                  action: navigate
                  navigation_path: rollladen-diagnose
              - type: button
                name: Service
                icon: mdi:tools
                tap_action:
