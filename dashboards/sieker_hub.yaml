            cards:
              - type: custom:button-card
                template: hub_metric_card
                entity: sensor.heizung_sollprofil
                name: Sollprofil
                icon: mdi:radiator
                state_display: >
                  [[[
                    const value = entity?.state;
                    if (value === 'komfort_21') return 'Komfort 21°';
                    if (value === 'eco_19') return 'Eco 19°';
                    if (value === 'eco_17') return 'Eco 17°';
                    return value ?? '—';
                  ]]]
              - type: custom:button-card
                template: hub_metric_card
                entity: input_select.heizung_aktives_profil
                name: Aktiv
                icon: mdi:home-thermometer-outline
                state_display: >
                  [[[
                    const value = entity?.state;
                    if (value === 'komfort_21') return 'Komfort 21°';
                    if (value === 'eco_19') return 'Eco 19°';
                    if (value === 'eco_17') return 'Eco 17°';
                    return value ?? '—';
                  ]]]
              - type: custom:button-card
                template: hub_metric_card
                entity: input_datetime.heizung_last_applied
                name: Letzte Anwendung
                icon: mdi:clock-outline
                state_display: >
                  [[[
                    const raw = entity?.state;
                    const date = raw ? new Date(raw) : null;
                    if (date && !Number.isNaN(date.getTime())) {
                      return date.toLocaleString('de-DE', {
                        day: '2-digit',
                        month: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                      });
                    }
                    return raw ?? '—';
                  ]]]
              - type: custom:button-card
                template: hub_metric_card
                entity: input_text.heizung_last_action
                name: Letzte Entscheidung
