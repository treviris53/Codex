              - type: button
                name: Service
                icon: mdi:tools
                tap_action:
                  action: navigate
                  navigation_path: heizung-service
              - type: button
                name: Tuning
                icon: mdi:tune
                tap_action:
                  action: navigate
                  navigation_path: heizung-tuning
