                name: Override Ost
              - entity: input_boolean.rollladen_override_west
                name: Override West
              - entity: input_boolean.roborock_busy
                name: Roborock Busy
              - entity: binary_sensor.roborock_program_blocked
                name: Roborock Blocked
              - entity: binary_sensor.steckdose_saison_aktiv
                name: Balkon Saison
      - cards:
          - type: heading
            heading: Fachmodule
            heading_style: title
            icon: mdi:view-dashboard
          - type: grid
            columns: 3
            square: false
            cards:
              - type: button
                name: Heizung
                icon: mdi:radiator
                tap_action:
                  action: navigate
                  navigation_path: heizung
              - type: button
                name: Rollläden
                icon: mdi:window-shutter
                tap_action:
                  action: navigate
                  navigation_path: rollladen
              - type: button
                name: Steckdose Balkon
                icon: mdi:power-socket-de
                tap_action:
                  action: navigate
                  navigation_path: steckdose-balkon
              - type: button
                name: USV
                icon: mdi:generator-mobile
                tap_action:
                  action: navigate
                  navigation_path: usv
              - type: button
                name: Roborock
                icon: mdi:robot-vacuum
                tap_action:
                  action: navigate
                  navigation_path: roborock
              - type: button
                name: Waschmaschine
                icon: mdi:washing-machine
                tap_action:
                  action: navigate
                  navigation_path: waschmaschine

