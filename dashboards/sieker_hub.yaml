# Dashboard: Sieker Hub
# Version: 2.0.1
# Generated: 2026-03-22
# Notes:
# - Best-practice oriented hub dashboard.
title: Sieker Hub
views:
  - title: Home
    path: home
    icon: mdi:home-assistant
    type: sections
    max_columns: 3
    sections:
      - cards:
          - type: heading
            heading: Hausstatus
            heading_style: title
          - type: entities
            title: Lagebild
            show_header_toggle: false
            entities:
              - entity: input_boolean.anwesend
                name: Anwesenheit
              - entity: sensor.heizung_sollprofil
                name: Heizprofil
              - entity: sensor.rollladen_open_ts
                name: Rollläden öffnen
              - entity: sensor.rollladen_close_ts
                name: Rollläden schließen
              - entity: sensor.saros_20_set_status
                name: Roborock Status
