- title: Wochenplan
  path: roborock-wochenplan
  icon: mdi:calendar-clock
  subview: true
  type: sections
  max_columns: 1
  sections:
    - cards:
        - type: heading
          heading: Wochenplan
          heading_style: title
        - type: custom:button-card
          template: module_toggle_card
          entity: input_boolean.roborock_schedule_enabled
          name: Zeitplan aktiv
          icon: mdi:calendar-check-outline
    - cards:
        - type: heading
          heading: Wochentage
        - type: grid
          columns: 3
          square: false
          cards:
            - type: custom:button-card
              name: Montag
              icon: mdi:calendar
              show_label: true
              tap_action:
                action: navigate
                navigation_path: roborock-wochenplan-mon
              label: >
                [[[
                  const rows = [
                    ['input_boolean.roborock_slot_enabled_mon_1', 'input_datetime.roborock_time_mon_1', 'input_text.roborock_jobs_mon_1'],
                    ['input_boolean.roborock_slot_enabled_mon_2', 'input_datetime.roborock_time_mon_2', 'input_text.roborock_jobs_mon_2'],
                    ['input_boolean.roborock_slot_enabled_mon_3', 'input_datetime.roborock_time_mon_3', 'input_text.roborock_jobs_mon_3'],
                  ];
                  return rows
                    .filter(([enabled]) => states[enabled]?.state === 'on')
                    .map(([, timeId, jobsId]) => `${String(states[timeId]?.state ?? '--:--').slice(0, 5)} ${states[jobsId]?.state || '—'}`)
                    .join('<br>') || '—';
                ]]]
              styles:
                card:
                  - padding: 18px
                  - height: 160px
                  - background-color: rgba(120, 120, 120, 0.06)
                  - border: 1px solid rgba(120, 120, 120, 0.16)
                grid:
                  - grid-template-areas: '"i n" "l l"'
                  - grid-template-columns: 28px 1fr
                  - grid-template-rows: min-content 1fr
                icon:
                  - width: 20px
                name:
                  - justify-self: start
                  - font-size: 18px
                  - white-space: normal
                  - line-height: 1.2
                  - text-overflow: unset
                  - overflow: visible
                label:
                  - justify-self: start
                  - text-align: left
                  - white-space: normal
                  - font-size: 13px
                  - line-height: 1.45
              state:
                - operator: template
                  value: >
                    [[[
                      return ['input_boolean.roborock_slot_enabled_mon_1', 'input_boolean.roborock_slot_enabled_mon_2', 'input_boolean.roborock_slot_enabled_mon_3']
                        .some((id) => states[id]?.state === 'on');
                    ]]]
                  styles:
                    card:
                      - background-color: rgba(164, 186, 143, 0.24)
                      - border: 1px solid rgba(129, 156, 106, 0.38)
                    icon:
                      - color: var(--success-color)
