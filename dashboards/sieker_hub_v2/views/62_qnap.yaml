- title: QNAP
  path: qnap
  icon: mdi:nas
  type: sections
  max_columns: 3
  sections:
    - cards:
        - type: heading
          heading: Übersicht
          heading_style: title
          badges:
            - type: entity
              entity: sensor.nas8649a0_status
            - type: entity
              entity: sensor.nas8649a0_betriebszeit
        - type: grid
          columns: 1
          square: false
          cards:
            - type: custom:button-card
              template: qnap_high_metric_card
              entity: sensor.nas8649a0_cpu_auslastung
              variables:
                warn_threshold: 70
                crit_threshold: 90
              name: CPU-Last
              icon: mdi:chip
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value} %` : entity?.state ?? '—';
                ]]]
            - type: custom:button-card
              template: qnap_high_metric_card
              entity: sensor.nas8649a0_arbeitsspeicherauslastung
              variables:
                warn_threshold: 70
                crit_threshold: 90
              name: RAM-Last
              icon: mdi:memory
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value} %` : entity?.state ?? '—';
                ]]]
            - type: custom:button-card
              template: qnap_high_metric_card
              entity: sensor.nas8649a0_cpu_temperatur
              variables:
                warn_threshold: 70
                crit_threshold: 80
              name: CPU-Temperatur
              icon: mdi:thermometer
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value} °C` : entity?.state ?? '—';
                ]]]
            - type: custom:button-card
              template: qnap_high_metric_card
              entity: sensor.nas8649a0_systemtemperatur
              variables:
                warn_threshold: 45
                crit_threshold: 55
              name: Systemtemperatur
              icon: mdi:thermometer-lines
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value} °C` : entity?.state ?? '—';
                ]]]
            - type: custom:button-card
              template: qnap_high_metric_card
              entity: sensor.qnap_ssd_temp
              variables:
                warn_threshold: 45
                crit_threshold: 55
              name: SSD-Mittel
              icon: mdi:harddisk
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value} °C` : entity?.state ?? '—';
                ]]]
    - cards:
        - type: heading
          heading: Speicher & Netz
        - type: grid
          columns: 1
          square: false
          cards:
            - type: custom:button-card
              template: qnap_high_metric_card
              entity: sensor.nas8649a0_verwendetes_volume_has
              variables:
                warn_threshold: 80
                crit_threshold: 90
              name: HAS
              icon: mdi:home-assistant
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value} %` : entity?.state ?? '—';
                ]]]
            - type: custom:button-card
              template: qnap_high_metric_card
              entity: sensor.nas8649a0_verwendetes_volume_container
              variables:
                warn_threshold: 80
                crit_threshold: 90
              name: Container
              icon: mdi:docker
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value} %` : entity?.state ?? '—';
                ]]]
            - type: custom:button-card
              template: qnap_link_card
              entity: sensor.nas8649a0_eth0_link
              name: eth0 Link
              icon: mdi:ethernet
              state_display: >
                [[[
                  const raw = String(entity?.state ?? '—');
                  const value = raw.toLowerCase();
                  if (value === 'up') return 'Verbunden';
                  if (value === 'down') return 'Getrennt';
                  return raw;
                ]]]
            - type: custom:button-card
              template: qnap_link_card
              entity: sensor.nas8649a0_eth1_link
              name: eth1 Link
              icon: mdi:ethernet
              state_display: >
                [[[
                  const raw = String(entity?.state ?? '—');
                  const value = raw.toLowerCase();
                  if (value === 'up') return 'Verbunden';
                  if (value === 'down') return 'Getrennt';
                  return raw;
                ]]]
            - type: custom:button-card
              template: qnap_error_counter_card
              entity: sensor.nas8649a0_eth0_paketfehler
              variables:
                warn_threshold: 1
                crit_threshold: 10
              name: eth0 Fehler
              icon: mdi:alert-circle-outline
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value}` : entity?.state ?? '—';
                ]]]
            - type: custom:button-card
              template: qnap_error_counter_card
              entity: sensor.nas8649a0_eth1_paketfehler
              variables:
                warn_threshold: 1
                crit_threshold: 10
              name: eth1 Fehler
              icon: mdi:alert-circle-outline
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value}` : entity?.state ?? '—';
                ]]]
    - cards:
        - type: heading
          heading: Untermenüs
        - type: grid
          columns: 1
          square: false
          cards:
            - type: custom:button-card
              template: hub_nav_card
              name: Diagnose
              icon: mdi:bug-outline
              tap_action:
                action: navigate
                navigation_path: qnap-diagnose
    - cards:
        - type: heading
          heading: Einordnung
        - type: custom:button-card
          template: info_panel_card
          name: QNAP
          label: >
            Bündelt NAS-Gesundheit, Temperaturbild, wichtige Volume-Auslastungen
            und Link-Fehler als kompaktes Geräte-Modul. Die Detaildiagnose trennt
            System, Laufwerke, Volumes und Netzwerk ohne zusätzliche Logik im
            Dashboard nachzubauen.
          icon: mdi:nas
