- title: Diagnose
  path: qnap-diagnose
  icon: mdi:bug-outline
  subview: true
  type: sections
  max_columns: 3
  sections:
    - cards:
        - type: heading
          heading: System
          heading_style: title
        - type: grid
          columns: 1
          square: false
          cards:
            - type: custom:button-card
              template: qnap_text_health_card
              entity: sensor.nas8649a0_status
              name: Status
              icon: mdi:information-outline
            - type: custom:button-card
              template: hub_metric_card
              entity: sensor.nas8649a0_betriebszeit
              name: Betriebszeit
              icon: mdi:clock-outline
              state_display: >
                [[[
                  const raw = entity?.state;
                  const date = raw ? new Date(raw) : null;
                  if (date && !Number.isNaN(date.getTime())) {
                    return date.toLocaleString('de-DE', {
                      day: '2-digit',
                      month: '2-digit',
                      hour: '2-digit',
                      minute: '2-digit',
                    });
                  }
                  return raw ?? '—';
                ]]]
            - type: custom:button-card
              template: qnap_percent_card
              entity: sensor.nas8649a0_cpu_auslastung
              variables:
                warn_threshold: 70
                crit_threshold: 90
              name: CPU-Last
              icon: mdi:chip
            - type: custom:button-card
              template: qnap_percent_card
              entity: sensor.nas8649a0_arbeitsspeicherauslastung
              variables:
                warn_threshold: 70
                crit_threshold: 90
              name: RAM-Last
              icon: mdi:memory
            - type: custom:button-card
              template: qnap_storage_card
              entity: sensor.nas8649a0_verwendeter_arbeitsspeicher
              name: RAM genutzt
              icon: mdi:memory-arrow-down
            - type: custom:button-card
              template: qnap_storage_card
              entity: sensor.nas8649a0_verfugbarer_arbeitsspeicher
              name: RAM frei
              icon: mdi:memory-arrow-up
            - type: custom:button-card
              template: qnap_high_metric_card
              entity: sensor.nas8649a0_cpu_temperatur
              variables:
                warn_threshold: 70
                crit_threshold: 80
              name: CPU-Temperatur
              icon: mdi:thermometer
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value} °C` : entity?.state ?? '—';
                ]]]
            - type: custom:button-card
              template: qnap_high_metric_card
              entity: sensor.nas8649a0_systemtemperatur
              variables:
                warn_threshold: 45
                crit_threshold: 55
              name: Systemtemperatur
              icon: mdi:thermometer-lines
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value} °C` : entity?.state ?? '—';
                ]]]
            - type: custom:button-card
              template: qnap_high_metric_card
              entity: sensor.qnap_ssd_temp
              variables:
                warn_threshold: 45
                crit_threshold: 55
              name: SSD-Mittel
              icon: mdi:harddisk
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value} °C` : entity?.state ?? '—';
                ]]]
