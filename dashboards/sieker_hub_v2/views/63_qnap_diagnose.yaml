    - cards:
        - type: heading
          heading: Netzwerk
        - type: grid
          columns: 1
          square: false
          cards:
            - type: custom:button-card
              template: qnap_link_card
              entity: sensor.nas8649a0_eth0_link
              name: eth0 Link
              icon: mdi:ethernet
              state_display: >
                [[[
                  const raw = String(entity?.state ?? '—');
                  const value = raw.toLowerCase();
                  if (value === 'up') return 'Verbunden';
                  if (value === 'down') return 'Getrennt';
                  return raw;
                ]]]
            - type: custom:button-card
              template: hub_metric_card
              entity: sensor.nas8649a0_eth0_hochstgeschwindigkeit
              name: eth0 Max
              icon: mdi:speedometer
              state_display: >
                [[[
                  const value = Number(entity?.state);
                  return Number.isFinite(value) ? `${value} Mbit/s` : entity?.state ?? '—';
                ]]]
