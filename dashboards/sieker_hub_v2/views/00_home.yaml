- title: Home
  path: home
  icon: mdi:view-dashboard-outline
  type: sections
  max_columns: 3
  sections:
    - cards:
        - type: heading
          heading: Hausstatus
          heading_style: title
        - type: heading
          heading: Lagebild
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:button-card
              template: hub_metric_card
              entity: input_boolean.anwesend
              name: Anwesend
              icon: mdi:account-check-outline
              state_display: >
                [[[
                  return entity?.state === 'on' ? 'Ja' : 'Nein';
                ]]]
            - type: custom:button-card
              template: hub_metric_card
              entity: sensor.heizung_sollprofil
              name: Profil
              icon: mdi:radiator
              state_display: >
                [[[
                  const raw = entity?.state ?? '—';
                  const parts = String(raw).split('_');
                  if (parts.length === 2 && /^\d+$/.test(parts[1])) {
                    const label = parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
                    return `${label} ${parts[1]}°`;
                  }
                  return String(raw).replaceAll('_', ' ');
                ]]]
            - type: custom:button-card
              template: hub_metric_card
              entity: sensor.rollladen_open_ts
              name: Öffnen
              icon: mdi:window-shutter-open
              state_display: >
                [[[
                  const raw = entity?.state;
                  const date = raw ? new Date(raw) : null;
                  if (date && !Number.isNaN(date.getTime())) {
                    return date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                  }
                  return raw ?? '—';
                ]]]
            - type: custom:button-card
              template: hub_metric_card
              entity: sensor.rollladen_close_ts
              name: Schließen
              icon: mdi:window-shutter
              state_display: >
                [[[
                  const raw = entity?.state;
                  const date = raw ? new Date(raw) : null;
                  if (date && !Number.isNaN(date.getTime())) {
                    return date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                  }
                  return raw ?? '—';
                ]]]
            - type: custom:button-card
              template: hub_metric_card
              entity: binary_sensor.roborock_maintenance_due
              name: Roborock
              icon: mdi:robot-vacuum
              triggers_update:
                - sensor.saros_20_set_status
              state_display: >
                [[[
                  const raw = states['sensor.saros_20_set_status']?.state;
                  const map = {
                    charging: 'Lädt',
                    docked: 'Dock',
                    cleaning: 'Reinigt',
                    paused: 'Pausiert',
                    idle: 'Bereit',
                    returning_home: 'Rückkehr',
                  };
                  const status = map[raw] ?? raw ?? '—';
                  return entity?.state === 'on' ? `${status} · Wartung` : status;
                ]]]
              state:
                - value: 'on'
                  styles:
                    card:
                      - background: rgba(var(--rgb-error-color), 0.10)
                    img_cell:
                      - background: rgba(var(--rgb-error-color), 0.18)
                    icon:
                      - color: var(--error-color)
                    state:
                      - color: var(--error-color)
            - type: custom:button-card
              template: hub_metric_card
              entity: sensor.eaton_3s850d_batterie_ladung
              name: USV
              icon: mdi:battery-high
              state_display: >
                [[[
                  const raw = entity?.state;
                  const value = Number(raw);
                  if (Number.isFinite(value)) {
                    return `${value} %`;
                  }
                  return raw ?? '—';
                ]]]
            - type: custom:button-card
              template: hub_metric_card
              entity: sensor.nas8649a0_status
              name: QNAP
              icon: mdi:nas
              triggers_update:
                - sensor.nas8649a0_eth0_link
                - sensor.nas8649a0_eth1_link
                - sensor.nas8649a0_eth0_paketfehler
                - sensor.nas8649a0_eth1_paketfehler
                - sensor.nas8649a0_verwendetes_volume_has
                - sensor.nas8649a0_verwendetes_volume_container
              state_display: >
                [[[
                  const statusRaw = entity?.state ?? '—';
                  const status = String(statusRaw).replaceAll('_', ' ');
                  const has = Number(states['sensor.nas8649a0_verwendetes_volume_has']?.state);
                  const container = Number(states['sensor.nas8649a0_verwendetes_volume_container']?.state);
                  const eth0 = String(states['sensor.nas8649a0_eth0_link']?.state ?? '—');
                  const eth1 = String(states['sensor.nas8649a0_eth1_link']?.state ?? '—');
                  const err0 = Number(states['sensor.nas8649a0_eth0_paketfehler']?.state);
                  const err1 = Number(states['sensor.nas8649a0_eth1_paketfehler']?.state);
                  if (Number.isFinite(err0) && err0 > 0) return `${status} · eth0 Fehler ${err0}`;
                  if (Number.isFinite(err1) && err1 > 0) return `${status} · eth1 Fehler ${err1}`;
                  if (Number.isFinite(has) && has >= 90) return `${status} · HAS ${Math.round(has)} %`;
                  if (Number.isFinite(container) && container >= 90) return `${status} · Container ${Math.round(container)} %`;
                  if (eth0 !== '—' && eth0.toLowerCase() !== 'up') return `${status} · eth0 ${eth0}`;
                  if (eth1 !== '—' && eth1.toLowerCase() !== 'up') return `${status} · eth1 ${eth1}`;
                  return status;
                ]]]
              styles:
                card:
                  - background: >
                      [[[
                        const statusRaw = String(entity?.state ?? '').toLowerCase();
                        const has = Number(states['sensor.nas8649a0_verwendetes_volume_has']?.state);
                        const container = Number(states['sensor.nas8649a0_verwendetes_volume_container']?.state);
                        const eth0 = String(states['sensor.nas8649a0_eth0_link']?.state ?? '').toLowerCase();
                        const eth1 = String(states['sensor.nas8649a0_eth1_link']?.state ?? '').toLowerCase();
                        const err0 = Number(states['sensor.nas8649a0_eth0_paketfehler']?.state);
                        const err1 = Number(states['sensor.nas8649a0_eth1_paketfehler']?.state);
                        const okValues = ['good', 'ready', 'normal', 'healthy', 'ok'];
                        const warnValues = ['warning', 'warn', 'degraded'];
                        if (!statusRaw || statusRaw === 'unknown' || statusRaw === 'unavailable') return 'rgba(var(--rgb-error-color), 0.10)';
                        if (Number.isFinite(err0) && err0 >= 10) return 'rgba(var(--rgb-error-color), 0.10)';
                        if (Number.isFinite(err1) && err1 >= 10) return 'rgba(var(--rgb-error-color), 0.10)';
                        if (Number.isFinite(has) && has >= 90) return 'rgba(var(--rgb-error-color), 0.10)';
                        if (Number.isFinite(container) && container >= 90) return 'rgba(var(--rgb-error-color), 0.10)';
                        if (eth0 && eth0 !== 'up') return 'rgba(var(--rgb-error-color), 0.10)';
                        if (eth1 && eth1 !== 'up') return 'rgba(var(--rgb-error-color), 0.10)';
                        if (Number.isFinite(err0) && err0 > 0) return 'rgba(var(--rgb-warning-color), 0.10)';
                        if (Number.isFinite(err1) && err1 > 0) return 'rgba(var(--rgb-warning-color), 0.10)';
                        if (Number.isFinite(has) && has >= 80) return 'rgba(var(--rgb-warning-color), 0.10)';
                        if (Number.isFinite(container) && container >= 80) return 'rgba(var(--rgb-warning-color), 0.10)';
                        if (warnValues.some((value) => statusRaw.includes(value))) return 'rgba(var(--rgb-warning-color), 0.10)';
                        if (!okValues.some((value) => statusRaw.includes(value))) return 'rgba(var(--rgb-error-color), 0.10)';
                        return null;
                      ]]]
                img_cell:
                  - background: >
                      [[[
                        const statusRaw = String(entity?.state ?? '').toLowerCase();
                        const has = Number(states['sensor.nas8649a0_verwendetes_volume_has']?.state);
                        const container = Number(states['sensor.nas8649a0_verwendetes_volume_container']?.state);
                        const eth0 = String(states['sensor.nas8649a0_eth0_link']?.state ?? '').toLowerCase();
                        const eth1 = String(states['sensor.nas8649a0_eth1_link']?.state ?? '').toLowerCase();
                        const err0 = Number(states['sensor.nas8649a0_eth0_paketfehler']?.state);
                        const err1 = Number(states['sensor.nas8649a0_eth1_paketfehler']?.state);
                        const okValues = ['good', 'ready', 'normal', 'healthy', 'ok'];
                        const warnValues = ['warning', 'warn', 'degraded'];
                        if (!statusRaw || statusRaw === 'unknown' || statusRaw === 'unavailable') return 'rgba(var(--rgb-error-color), 0.18)';
                        if (Number.isFinite(err0) && err0 >= 10) return 'rgba(var(--rgb-error-color), 0.18)';
                        if (Number.isFinite(err1) && err1 >= 10) return 'rgba(var(--rgb-error-color), 0.18)';
                        if (Number.isFinite(has) && has >= 90) return 'rgba(var(--rgb-error-color), 0.18)';
                        if (Number.isFinite(container) && container >= 90) return 'rgba(var(--rgb-error-color), 0.18)';
                        if (eth0 && eth0 !== 'up') return 'rgba(var(--rgb-error-color), 0.18)';
                        if (eth1 && eth1 !== 'up') return 'rgba(var(--rgb-error-color), 0.18)';
                        if (Number.isFinite(err0) && err0 > 0) return 'rgba(var(--rgb-warning-color), 0.18)';
                        if (Number.isFinite(err1) && err1 > 0) return 'rgba(var(--rgb-warning-color), 0.18)';
                        if (Number.isFinite(has) && has >= 80) return 'rgba(var(--rgb-warning-color), 0.18)';
                        if (Number.isFinite(container) && container >= 80) return 'rgba(var(--rgb-warning-color), 0.18)';
                        if (warnValues.some((value) => statusRaw.includes(value))) return 'rgba(var(--rgb-warning-color), 0.18)';
                        if (!okValues.some((value) => statusRaw.includes(value))) return 'rgba(var(--rgb-error-color), 0.18)';
                        return null;
                      ]]]
                icon:
                  - color: >
                      [[[
                        const statusRaw = String(entity?.state ?? '').toLowerCase();
                        const has = Number(states['sensor.nas8649a0_verwendetes_volume_has']?.state);
                        const container = Number(states['sensor.nas8649a0_verwendetes_volume_container']?.state);
                        const eth0 = String(states['sensor.nas8649a0_eth0_link']?.state ?? '').toLowerCase();
                        const eth1 = String(states['sensor.nas8649a0_eth1_link']?.state ?? '').toLowerCase();
                        const err0 = Number(states['sensor.nas8649a0_eth0_paketfehler']?.state);
                        const err1 = Number(states['sensor.nas8649a0_eth1_paketfehler']?.state);
                        const okValues = ['good', 'ready', 'normal', 'healthy', 'ok'];
                        const warnValues = ['warning', 'warn', 'degraded'];
                        if (!statusRaw || statusRaw === 'unknown' || statusRaw === 'unavailable') return 'var(--error-color)';
                        if (Number.isFinite(err0) && err0 >= 10) return 'var(--error-color)';
                        if (Number.isFinite(err1) && err1 >= 10) return 'var(--error-color)';
                        if (Number.isFinite(has) && has >= 90) return 'var(--error-color)';
                        if (Number.isFinite(container) && container >= 90) return 'var(--error-color)';
                        if (eth0 && eth0 !== 'up') return 'var(--error-color)';
                        if (eth1 && eth1 !== 'up') return 'var(--error-color)';
                        if (Number.isFinite(err0) && err0 > 0) return 'var(--warning-color)';
                        if (Number.isFinite(err1) && err1 > 0) return 'var(--warning-color)';
                        if (Number.isFinite(has) && has >= 80) return 'var(--warning-color)';
                        if (Number.isFinite(container) && container >= 80) return 'var(--warning-color)';
                        if (warnValues.some((value) => statusRaw.includes(value))) return 'var(--warning-color)';
                        if (!okValues.some((value) => statusRaw.includes(value))) return 'var(--error-color)';
                        return null;
                      ]]]
                state:
                  - color: >
                      [[[
                        const statusRaw = String(entity?.state ?? '').toLowerCase();
                        const has = Number(states['sensor.nas8649a0_verwendetes_volume_has']?.state);
                        const container = Number(states['sensor.nas8649a0_verwendetes_volume_container']?.state);
                        const eth0 = String(states['sensor.nas8649a0_eth0_link']?.state ?? '').toLowerCase();
                        const eth1 = String(states['sensor.nas8649a0_eth1_link']?.state ?? '').toLowerCase();
                        const err0 = Number(states['sensor.nas8649a0_eth0_paketfehler']?.state);
                        const err1 = Number(states['sensor.nas8649a0_eth1_paketfehler']?.state);
                        const okValues = ['good', 'ready', 'normal', 'healthy', 'ok'];
                        const warnValues = ['warning', 'warn', 'degraded'];
                        if (!statusRaw || statusRaw === 'unknown' || statusRaw === 'unavailable') return 'var(--error-color)';
                        if (Number.isFinite(err0) && err0 >= 10) return 'var(--error-color)';
                        if (Number.isFinite(err1) && err1 >= 10) return 'var(--error-color)';
                        if (Number.isFinite(has) && has >= 90) return 'var(--error-color)';
                        if (Number.isFinite(container) && container >= 90) return 'var(--error-color)';
                        if (eth0 && eth0 !== 'up') return 'var(--error-color)';
                        if (eth1 && eth1 !== 'up') return 'var(--error-color)';
                        if (Number.isFinite(err0) && err0 > 0) return 'var(--warning-color)';
                        if (Number.isFinite(err1) && err1 > 0) return 'var(--warning-color)';
                        if (Number.isFinite(has) && has >= 80) return 'var(--warning-color)';
                        if (Number.isFinite(container) && container >= 80) return 'var(--warning-color)';
                        if (warnValues.some((value) => statusRaw.includes(value))) return 'var(--warning-color)';
                        if (!okValues.some((value) => statusRaw.includes(value))) return 'var(--error-color)';
                        return null;
                      ]]]
    - cards:
        - type: heading
          heading: Handlungsbedarf
          heading_style: title
        - type: heading
          heading: Abweichungen
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:button-card
              template: hub_alert_card
              entity: input_boolean.heizung_override
              name: Heizung Override
              icon: mdi:radiator-disabled
            - type: custom:button-card
              template: hub_alert_card
              entity: input_boolean.rollladen_override_ost
              name: Override Ost
              icon: mdi:window-shutter-alert
            - type: custom:button-card
              template: hub_alert_card
              entity: input_boolean.rollladen_override_west
              name: Override West
              icon: mdi:window-shutter-alert
            - type: custom:button-card
              template: hub_roborock_alert_card
              entity: input_boolean.roborock_busy
              name: Roborock aktiv
              icon: mdi:robot-vacuum-alert
            - type: custom:button-card
              template: hub_roborock_alert_card
              entity: binary_sensor.roborock_program_blocked
              name: Roborock blockiert
              icon: mdi:cancel-octagon-outline
            - type: custom:button-card
              template: hub_alert_card
              entity: binary_sensor.steckdose_saison_aktiv
              name: Saisonbetrieb
              icon: mdi:power-plug-outline
    - cards:
        - type: heading
          heading: Fachmodule
          heading_style: title
          icon: mdi:view-dashboard
        - type: grid
          columns: 3
          square: false
          cards:
            - type: custom:button-card
              template: hub_nav_card
              name: Heizung
              icon: mdi:radiator
              tap_action:
                action: navigate
                navigation_path: heizung
            - type: custom:button-card
              template: hub_nav_card
              name: Rollläden
              icon: mdi:window-shutter
              tap_action:
                action: navigate
                navigation_path: rollladen
            - type: custom:button-card
              template: hub_nav_card
              name: Steckdose Balkon
              icon: mdi:power-socket-de
              tap_action:
                action: navigate
                navigation_path: steckdose-balkon
            - type: custom:button-card
              template: hub_nav_card
              name: USV
              icon: mdi:generator-mobile
              tap_action:
                action: navigate
                navigation_path: usv
            - type: custom:button-card
              template: hub_nav_card
              name: QNAP
              icon: mdi:nas
              tap_action:
                action: navigate
                navigation_path: qnap
            - type: custom:button-card
              template: hub_nav_card
              name: Roborock
              icon: mdi:robot-vacuum
              tap_action:
                action: navigate
                navigation_path: roborock
            - type: custom:button-card
              template: hub_nav_card
              name: Waschen
              icon: mdi:washing-machine
              tap_action:
                action: navigate
                navigation_path: waschmaschine
            - type: custom:button-card
              template: hub_nav_card
              name: Wohnen
              icon: mdi:sofa-outline
              tap_action:
                action: navigate
                navigation_path: wohnen
