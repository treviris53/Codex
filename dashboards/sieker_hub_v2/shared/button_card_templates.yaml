module_toggle_card:
  show_label: false
  show_state: true
  tap_action:
    action: toggle
  hold_action:
    action: more-info
  state_display: >
    [[[
      if (entity?.state === 'on') return 'Ein';
      if (entity?.state === 'off') return 'Aus';
      return entity?.state ?? '—';
    ]]]
  styles:
    card:
      - padding: 18px 16px
      - min-height: 104px
      - border-radius: 20px
    grid:
      - grid-template-areas: '"i n" "i s"'
      - grid-template-columns: 44px minmax(0, 1fr)
      - grid-template-rows: min-content min-content
      - column-gap: 14px
      - row-gap: 4px
    img_cell:
      - width: 44px
      - height: 44px
      - justify-self: center
      - align-self: center
      - background: rgba(var(--rgb-primary-color), 0.10)
      - border-radius: 14px
    icon:
      - width: 22px
      - color: var(--primary-color)
    name:
      - justify-self: start
      - align-self: end
      - font-size: 18px
      - font-weight: 500
      - white-space: normal
      - text-align: left
    state:
      - justify-self: start
      - align-self: start
      - font-size: 16px
      - font-weight: 500
      - text-align: left
      - color: var(--secondary-text-color)
  state:
    - value: 'on'
      styles:
        card:
          - background: rgba(var(--rgb-primary-color), 0.10)
        img_cell:
          - background: rgba(var(--rgb-primary-color), 0.18)
        state:
          - color: var(--primary-color)
