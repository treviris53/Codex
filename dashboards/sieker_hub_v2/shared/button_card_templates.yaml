qnap_high_metric_card:
  template: hub_metric_card
  styles:
    card:
      - background: >
          [[[
            const value = Number(entity?.state);
            const warn = Number(variables?.warn_threshold);
            const crit = Number(variables?.crit_threshold);
            if (!Number.isFinite(value)) return null;
            if (Number.isFinite(crit) && value >= crit) return 'rgba(var(--rgb-error-color), 0.10)';
            if (Number.isFinite(warn) && value >= warn) return 'rgba(var(--rgb-warning-color), 0.10)';
            return null;
          ]]]
    img_cell:
      - background: >
          [[[
            const value = Number(entity?.state);
            const warn = Number(variables?.warn_threshold);
            const crit = Number(variables?.crit_threshold);
            if (!Number.isFinite(value)) return null;
            if (Number.isFinite(crit) && value >= crit) return 'rgba(var(--rgb-error-color), 0.18)';
            if (Number.isFinite(warn) && value >= warn) return 'rgba(var(--rgb-warning-color), 0.18)';
            return null;
          ]]]
    icon:
      - color: >
          [[[
            const value = Number(entity?.state);
            const warn = Number(variables?.warn_threshold);
            const crit = Number(variables?.crit_threshold);
            if (!Number.isFinite(value)) return null;
            if (Number.isFinite(crit) && value >= crit) return 'var(--error-color)';
            if (Number.isFinite(warn) && value >= warn) return 'var(--warning-color)';
            return null;
          ]]]
    state:
      - color: >
          [[[
            const value = Number(entity?.state);
            const warn = Number(variables?.warn_threshold);
            const crit = Number(variables?.crit_threshold);
            if (!Number.isFinite(value)) return null;
            if (Number.isFinite(crit) && value >= crit) return 'var(--error-color)';
            if (Number.isFinite(warn) && value >= warn) return 'var(--warning-color)';
            return null;
          ]]]
qnap_percent_card:
  template: qnap_high_metric_card
  state_display: >
    [[[
      const value = Number(entity?.state);
      if (!Number.isFinite(value)) return entity?.state ?? '—';
      return `${value.toLocaleString('de-DE', { maximumFractionDigits: 0 })} %`;
    ]]]
qnap_storage_card:
  template: hub_metric_card
  state_display: >
    [[[
      const value = Number(entity?.state);
      if (!Number.isFinite(value)) return entity?.state ?? '—';
      return `${value.toLocaleString('de-DE', { minimumFractionDigits: 1, maximumFractionDigits: 1 })} GiB`;
    ]]]
