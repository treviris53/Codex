qnap_link_card:
  template: hub_metric_card
  styles:
    card:
      - background: >
          [[[
            const raw = String(entity?.state ?? '').toLowerCase();
            if (!raw) return null;
            if (raw === 'up' || raw === 'verbunden' || raw === 'connected') return null;
            return 'rgba(var(--rgb-error-color), 0.10)';
