qnap_text_health_card:
  template: hub_metric_card
  styles:
    card:
      - background: >
          [[[
            const raw = String(entity?.state ?? '').toLowerCase().trim();
            if (!raw || raw === 'unknown' || raw === 'unavailable') return 'rgba(var(--rgb-error-color), 0.10)';
            const okValues = ['good', 'ready', 'normal', 'healthy', 'ok'];
            const warnValues = ['warning', 'warn', 'degraded'];
            if (okValues.some((value) => raw.includes(value))) return null;
            if (warnValues.some((value) => raw.includes(value))) return 'rgba(var(--rgb-warning-color), 0.10)';
            return 'rgba(var(--rgb-error-color), 0.10)';
          ]]]
    img_cell:
      - background: >
          [[[
            const raw = String(entity?.state ?? '').toLowerCase().trim();
            if (!raw || raw === 'unknown' || raw === 'unavailable') return 'rgba(var(--rgb-error-color), 0.18)';
            const okValues = ['good', 'ready', 'normal', 'healthy', 'ok'];
            const warnValues = ['warning', 'warn', 'degraded'];
            if (okValues.some((value) => raw.includes(value))) return null;
            if (warnValues.some((value) => raw.includes(value))) return 'rgba(var(--rgb-warning-color), 0.18)';
            return 'rgba(var(--rgb-error-color), 0.18)';
          ]]]
    icon:
      - color: >
          [[[
            const raw = String(entity?.state ?? '').toLowerCase().trim();
            if (!raw || raw === 'unknown' || raw === 'unavailable') return 'var(--error-color)';
            const okValues = ['good', 'ready', 'normal', 'healthy', 'ok'];
            const warnValues = ['warning', 'warn', 'degraded'];
            if (okValues.some((value) => raw.includes(value))) return null;
            if (warnValues.some((value) => raw.includes(value))) return 'var(--warning-color)';
            return 'var(--error-color)';
          ]]]
    state:
      - color: >
          [[[
            const raw = String(entity?.state ?? '').toLowerCase().trim();
            if (!raw || raw === 'unknown' || raw === 'unavailable') return 'var(--error-color)';
            const okValues = ['good', 'ready', 'normal', 'healthy', 'ok'];
