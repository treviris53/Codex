hub_metric_card:
  show_label: false
  show_state: true
  tap_action:
    action: more-info
  state_display: >
    [[[
      const value = entity?.state;
      if (value === 'on') return 'Ein';
      if (value === 'off') return 'Aus';
      if (value === 'home') return 'Anwesend';
      if (value === 'not_home') return 'Abwesend';
      return value ?? '—';
    ]]]
  styles:
    card:
      - padding: 18px 16px
      - min-height: 88px
      - border-radius: 20px
    grid:
      - grid-template-areas: '"i n" "i s"'
      - grid-template-columns: 44px minmax(0, 1fr)
      - grid-template-rows: min-content min-content
      - column-gap: 14px
      - row-gap: 4px
    img_cell:
      - width: 44px
      - height: 44px
      - justify-self: center
      - align-self: center
      - background: rgba(var(--rgb-primary-color), 0.10)
      - border-radius: 14px
    icon:
      - width: 22px
      - color: var(--primary-color)
    name:
      - justify-self: start
      - align-self: end
      - font-size: 18px
      - font-weight: 500
      - white-space: normal
      - text-align: left
      - line-height: 1.15
    state:
      - justify-self: start
      - align-self: start
      - font-size: 16px
      - font-weight: 500
      - text-align: left
      - color: var(--primary-text-color)
hub_alert_card:
