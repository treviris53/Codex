        card:
          - background: rgba(var(--rgb-warning-color), 0.10)
        img_cell:
          - background: rgba(var(--rgb-warning-color), 0.18)
        icon:
          - color: var(--warning-color)
        state:
          - color: var(--warning-color)
    - value: 'home'
      styles:
        card:
          - background: rgba(var(--rgb-warning-color), 0.10)
        img_cell:
          - background: rgba(var(--rgb-warning-color), 0.18)
        icon:
          - color: var(--warning-color)
        state:
          - color: var(--warning-color)
hub_roborock_alert_card:
