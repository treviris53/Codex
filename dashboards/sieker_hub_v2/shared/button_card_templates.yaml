v2_nav_card:
  show_state: false
  show_label: true
  label: >
    [[[
      return variables?.label ?? 'Modul oeffnen';
    ]]]
  styles:
    card:
      - padding: 18px 16px
      - min-height: 116px
      - border-radius: 20px
    grid:
      - grid-template-areas: '"i" "n" "l"'
      - grid-template-columns: 1fr
      - grid-template-rows: 1fr min-content min-content
      - row-gap: 10px
    img_cell:
      - justify-self: center
      - align-self: end
      - width: 44px
      - height: 44px
      - background: rgba(var(--rgb-primary-color), 0.10)
      - border-radius: 14px
    icon:
      - width: 24px
      - color: var(--primary-color)
    name:
      - justify-self: center
      - align-self: center
      - text-align: center
      - font-size: 16px
      - font-weight: 600
      - white-space: normal
    label:
      - justify-self: center
      - align-self: start
      - text-align: center
      - color: var(--secondary-text-color)
      - font-size: 13px
room_climate_card:
  show_state: false
  show_label: true
  tap_action:
    action: more-info
  label: >
    [[[
      const temp = states[variables.temp_entity]?.state ?? '—';
      const hum = states[variables.humidity_entity]?.state ?? '—';
      return `${temp} °C · ${hum} %`;
    ]]]
  styles:
    card:
      - padding: 18px 16px
      - height: 112px
      - border-radius: 20px
    grid:
      - grid-template-areas: '"i n" "i l"'
      - grid-template-columns: 44px 1fr
      - grid-template-rows: min-content min-content
      - column-gap: 12px
      - row-gap: 4px
    img_cell:
      - width: 44px
      - height: 44px
      - justify-self: center
      - align-self: center
      - background: rgba(var(--rgb-primary-color), 0.10)
      - border-radius: 14px
    icon:
      - width: 22px
      - color: var(--primary-color)
    name:
      - justify-self: start
      - align-self: end
      - font-size: 18px
      - font-weight: 500
      - white-space: normal
      - text-align: left
      - line-height: 1.15
    label:
      - justify-self: start
      - align-self: start
      - font-size: 15px
      - color: var(--secondary-text-color)
      - text-align: left
      - line-height: 1.2
room_context_card:
  show_label: false
  show_state: true
  tap_action:
    action: more-info
  styles:
    card:
      - padding: 18px 16px
      - min-height: 88px
      - border-radius: 20px
    grid:
      - grid-template-areas: '"i n s"'
      - grid-template-columns: 44px minmax(0, 1fr) auto
