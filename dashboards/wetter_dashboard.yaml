# Dashboard: Wetter
# Version: 2.2.0
# Generated: 2026-03-23
# Notes:
# - Fokus auf kompakte Wetterlage, Radar und DWD-Details.
# - Bestehende DWD- und Radar-Entitaeten bleiben unveraendert.

title: Wetter
views:
  - title: Aktuell
    path: aktuell
    icon: mdi:weather-partly-cloudy
    type: sections
    max_columns: 3
    sections:
      - cards:
          - type: heading
            heading: Aktuelle Lage
            heading_style: title
            badges:
              - type: entity
                entity: sensor.hamburg_fu_wetterzustand
              - type: entity
                entity: sensor.hamburg_fu_vorhersagezeit_local
              - type: entity
                entity: sensor.hamburg_fu_windrose
          - type: grid
            columns: 3
            square: false
            cards:
              - type: button
                name: Radar
                icon: mdi:radar
                tap_action:
                  action: navigate
                  navigation_path: radar
              - type: button
                name: DWD Details
                icon: mdi:chart-box-outline
                tap_action:
                  action: navigate
                  navigation_path: dwd-details
              - type: button
                entity: weather.hamburg_fu
                name: Forecast
                icon: mdi:weather-cloudy-arrow-right
                tap_action:
                  action: more-info
          - type: custom:button-card
            entity: sensor.hamburg_fu_temperatur
            name: Hamburg-Fuhlsbuettel
            icon: mdi:weather-partly-cloudy
            show_state: true
            show_label: true
            tap_action:
              action: more-info
            state_display: >
              [[[
                const temp = states['sensor.hamburg_fu_temperatur']?.state ?? '-';
                return `${temp} °C`;
              ]]]
            label: >
              [[[
                const condition = states['sensor.hamburg_fu_wetterzustand']?.state ?? '-';
                const high = states['sensor.hamburg_fu_tx_heute']?.state ?? '-';
                const low = states['sensor.hamburg_fu_tn_heute']?.state ?? '-';
                const humidity = states['sensor.hamburg_fu_luftfeuchtigkeit']?.state ?? '-';
                return `${condition}\nHeute ${low} bis ${high} °C · Feuchte ${humidity} %`;
              ]]]
            styles:
              card:
                - padding: 18px
                - min-height: 148px
              grid:
                - grid-template-areas: '"i n" "i s" "l l"'
                - grid-template-columns: 44px 1fr
                - grid-template-rows: min-content min-content 1fr
              icon:
                - width: 32px
                - color: var(--warning-color)
              name:
                - justify-self: start
                - font-size: 20px
                - font-weight: 600
              state:
                - justify-self: start
                - font-size: 38px
                - font-weight: 700
              label:
                - justify-self: start
                - text-align: left
                - white-space: pre-line
                - font-size: 14px
                - line-height: 1.4
          - type: markdown
            content: |
              **Tagesfokus**

              {% set current = states('sensor.hamburg_fu_temperatur') %}
              {% set condition = states('sensor.hamburg_fu_wetterzustand') %}
              {% set high = states('sensor.hamburg_fu_tx_heute') %}
              {% set low = states('sensor.hamburg_fu_tn_heute') %}
              {% set rain = states('sensor.hamburg_fu_precip_probability_next1h') %}
              {% set rain_sum = states('sensor.hamburg_fu_precip_sum_24h') %}
              {% set wind = states('sensor.hamburg_fu_windgeschwindigkeit') %}
              {% set gusts = states('sensor.hamburg_fu_windboen') %}
              {% set visibility = states('sensor.hamburg_fu_sichtweite') %}
              {{ condition }} bei {{ current }} °C.
              Heute zwischen {{ low }} und {{ high }} °C.
              Regenrisiko naechste Stunde {{ rain }} %, erwartete 24h-Summe {{ rain_sum }} mm.
              Wind {{ wind }} km/h mit Boeen bis {{ gusts }} km/h, Sichtweite {{ visibility }} km.
          - type: markdown
            content: |
              **Warnlage**

              {% set rain = states('sensor.hamburg_fu_precip_probability_next1h') | float(0) %}
              {% set rain_now = states('sensor.hamburg_fu_niederschlag') | float(0) %}
              {% set wind = states('sensor.hamburg_fu_windgeschwindigkeit') | float(0) %}
              {% set gusts = states('sensor.hamburg_fu_windboen') | float(0) %}
              {% set visibility = states('sensor.hamburg_fu_sichtweite') | float(99) %}
              {% set fog = states('sensor.hamburg_fu_nebelwahrscheinlichkeit') | float(0) %}
              {% set sun = states('sensor.hamburg_fu_sonneneinstrahlung') | float(0) %}
              {% set messages = namespace(items=[]) %}
              {% if rain >= 70 or rain_now >= 0.3 %}
                {% set messages.items = messages.items + ['Regenlage: kurzfristig erhoehte Niederschlagswahrscheinlichkeit oder bereits aktiver Niederschlag.'] %}
              {% endif %}
              {% if gusts >= 45 or wind >= 30 %}
                {% set messages.items = messages.items + ['Windlage: boeiger Wind, empfindliche Aussenaktivitaeten und offene Fenster pruefen.'] %}
              {% endif %}
              {% if visibility <= 3 or fog >= 60 %}
                {% set messages.items = messages.items + ['Sichtlage: eingeschraenkte Sicht oder erhoehte Nebelwahrscheinlichkeit.'] %}
              {% endif %}
              {% if sun >= 250 %}
                {% set messages.items = messages.items + ['Sonnenlage: hohe Einstrahlung, geeignet fuer Balkon- oder Blendungsbewertung.'] %}
              {% endif %}
              {% if messages.items | count == 0 %}
                Keine markante Warnlage. Das Wetter wirkt derzeit im normalen Bereich.
              {% else %}
                {% for item in messages.items %}
                - {{ item }}
                {% endfor %}
              {% endif %}
          - type: markdown
            content: |
              **DWD Wetterbericht**

              {{ states('sensor.hamburg_fu_wetterbericht') }}
      - cards:
          - type: heading
            heading: Schnellbild
            heading_style: title
          - type: grid
            columns: 3
            square: false
            cards:
              - type: gauge
                entity: sensor.hamburg_fu_precip_probability_next1h
                name: Regen 1h
                needle: true
                severity:
                  green: 0
                  yellow: 40
                  red: 70
              - type: gauge
                entity: sensor.hamburg_fu_windboen
                name: Boeen
                needle: true
                severity:
                  green: 0
                  yellow: 30
                  red: 45
              - type: gauge
                entity: sensor.hamburg_fu_sichtweite
                name: Sichtweite
                needle: true
                severity:
                  red: 0
                  yellow: 3
                  green: 8
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:button-card
                entity: sensor.hamburg_fu_precip_probability_next1h
                name: Regen
                icon: mdi:weather-rainy
                show_state: true
                show_label: true
                tap_action:
                  action: more-info
                state_display: >
                  [[[
                    const probability = states['sensor.hamburg_fu_precip_probability_next1h']?.state ?? '-';
                    return `${probability} %`;
                  ]]]
                label: >
                  [[[
                    const current = states['sensor.hamburg_fu_niederschlag']?.state ?? '-';
                    const total = states['sensor.hamburg_fu_precip_sum_24h']?.state ?? '-';
                    return `Aktuell ${current} mm/h · 24h ${total} mm`;
                  ]]]
                styles:
                  card:
                    - padding: 14px
                    - height: 108px
                    - background-color: rgba(77, 137, 219, 0.08)
                    - border: 1px solid rgba(77, 137, 219, 0.16)
                  grid:
                    - grid-template-areas: '"i n" "i s" "l l"'
                    - grid-template-columns: 32px 1fr
                  name:
                    - justify-self: start
                    - font-size: 18px
                  state:
                    - justify-self: start
                    - font-size: 28px
                    - font-weight: 700
                  label:
                    - justify-self: start
                    - text-align: left
                    - white-space: normal
                state:
                  - operator: template
                    value: >
                      [[[
                        const probability = Number(states['sensor.hamburg_fu_precip_probability_next1h']?.state);
                        const current = Number(states['sensor.hamburg_fu_niederschlag']?.state);
                        return (Number.isFinite(probability) && probability >= 70) ||
                          (Number.isFinite(current) && current >= 0.3);
                      ]]]
                    styles:
                      card:
                        - background-color: rgba(77, 137, 219, 0.24)
                        - border: 1px solid rgba(77, 137, 219, 0.35)
                      icon:
                        - color: var(--info-color)
              - type: custom:button-card
                entity: sensor.hamburg_fu_windgeschwindigkeit
                name: Wind
                icon: mdi:weather-windy
                show_state: true
                show_label: true
                tap_action:
                  action: more-info
                state_display: >
                  [[[
                    const wind = states['sensor.hamburg_fu_windgeschwindigkeit']?.state ?? '-';
                    return `${wind} km/h`;
                  ]]]
                label: >
                  [[[
                    const gusts = states['sensor.hamburg_fu_windboen']?.state ?? '-';
                    const direction = states['sensor.hamburg_fu_windrose']?.state ?? '-';
                    const beaufort = states['sensor.hamburg_fu_beaufort']?.state ?? '-';
                    return `Boeen ${gusts} km/h · ${direction} · ${beaufort} Bft`;
                  ]]]
                styles:
                  card:
                    - padding: 14px
                    - height: 108px
                    - background-color: rgba(214, 135, 52, 0.08)
                    - border: 1px solid rgba(214, 135, 52, 0.16)
                  grid:
                    - grid-template-areas: '"i n" "i s" "l l"'
                    - grid-template-columns: 32px 1fr
                  name:
                    - justify-self: start
                    - font-size: 18px
                  state:
                    - justify-self: start
                    - font-size: 28px
                    - font-weight: 700
                  label:
                    - justify-self: start
                    - text-align: left
                    - white-space: normal
                state:
                  - operator: template
                    value: >
                      [[[
                        const gusts = Number(states['sensor.hamburg_fu_windboen']?.state);
                        const wind = Number(states['sensor.hamburg_fu_windgeschwindigkeit']?.state);
                        return (Number.isFinite(gusts) && gusts >= 45) ||
                          (Number.isFinite(wind) && wind >= 30);
                      ]]]
                    styles:
                      card:
                        - background-color: rgba(214, 135, 52, 0.22)
                        - border: 1px solid rgba(214, 135, 52, 0.35)
                      icon:
                        - color: var(--warning-color)
              - type: custom:button-card
                entity: sensor.hamburg_fu_luftfeuchtigkeit
                name: Luft
                icon: mdi:water-percent
                show_state: true
                show_label: true
                tap_action:
                  action: more-info
                state_display: >
                  [[[
                    const humidity = states['sensor.hamburg_fu_luftfeuchtigkeit']?.state ?? '-';
                    return `${humidity} %`;
                  ]]]
                label: >
                  [[[
                    const dewpoint = states['sensor.hamburg_fu_taupunkt']?.state ?? '-';
                    const absoluteHumidity = states['sensor.hamburg_fu_absolute_luftfeuchtigkeit']?.state ?? '-';
                    return `Taupunkt ${dewpoint} °C · Absolut ${absoluteHumidity} g/m³`;
                  ]]]
                styles:
                  card:
                    - padding: 14px
                    - height: 108px
                    - background-color: rgba(64, 167, 162, 0.08)
                    - border: 1px solid rgba(64, 167, 162, 0.16)
                  grid:
                    - grid-template-areas: '"i n" "i s" "l l"'
                    - grid-template-columns: 32px 1fr
                  name:
                    - justify-self: start
                    - font-size: 18px
                  state:
                    - justify-self: start
                    - font-size: 28px
                    - font-weight: 700
                  label:
                    - justify-self: start
                    - text-align: left
                    - white-space: normal
                state:
                  - operator: template
                    value: >
                      [[[
                        const humidity = Number(states['sensor.hamburg_fu_luftfeuchtigkeit']?.state);
                        return Number.isFinite(humidity) && humidity >= 85;
                      ]]]
                    styles:
                      card:
                        - background-color: rgba(64, 167, 162, 0.20)
                        - border: 1px solid rgba(64, 167, 162, 0.34)
              - type: custom:button-card
                entity: sensor.hamburg_fu_sichtweite
                name: Sicht
                icon: mdi:eye
                show_state: true
                show_label: true
                tap_action:
                  action: more-info
                state_display: >
                  [[[
                    const visibility = states['sensor.hamburg_fu_sichtweite']?.state ?? '-';
                    return `${visibility} km`;
                  ]]]
                label: >
                  [[[
                    const clouds = states['sensor.hamburg_fu_bewolkungsgrad']?.state ?? '-';
                    const fog = states['sensor.hamburg_fu_nebelwahrscheinlichkeit']?.state ?? '-';
                    return `Bewoelkung ${clouds} % · Nebel ${fog} %`;
                  ]]]
                styles:
                  card:
                    - padding: 14px
                    - height: 108px
                    - background-color: rgba(120, 120, 120, 0.07)
                    - border: 1px solid rgba(120, 120, 120, 0.14)
                  grid:
                    - grid-template-areas: '"i n" "i s" "l l"'
                    - grid-template-columns: 32px 1fr
                  name:
                    - justify-self: start
                    - font-size: 18px
                  state:
                    - justify-self: start
                    - font-size: 28px
                    - font-weight: 700
                  label:
                    - justify-self: start
                    - text-align: left
                    - white-space: normal
                state:
                  - operator: template
                    value: >
                      [[[
                        const visibility = Number(states['sensor.hamburg_fu_sichtweite']?.state);
                        const fog = Number(states['sensor.hamburg_fu_nebelwahrscheinlichkeit']?.state);
                        return (Number.isFinite(visibility) && visibility <= 3) ||
                          (Number.isFinite(fog) && fog >= 60);
                      ]]]
                    styles:
                      card:
                        - background-color: rgba(120, 120, 120, 0.18)
                        - border: 1px solid rgba(120, 120, 120, 0.30)
              - type: custom:button-card
                entity: sensor.hamburg_fu_sonneneinstrahlung
                name: Sonne
                icon: mdi:weather-sunny-alert
                show_state: true
                show_label: true
                tap_action:
                  action: more-info
                state_display: >
                  [[[
                    const irradiance = states['sensor.hamburg_fu_sonneneinstrahlung']?.state ?? '-';
                    return `${irradiance} W/m²`;
                  ]]]
                label: >
                  [[[
                    const durationSeconds = parseFloat(states['sensor.hamburg_fu_sonnenscheindauer']?.state);
                    const duration = Number.isFinite(durationSeconds) ? (durationSeconds / 3600).toFixed(1) : '-';
                    const pressure = states['sensor.hamburg_fu_druck']?.state ?? '-';
                    return `Sonnenschein ${duration} h · Druck ${pressure} hPa`;
                  ]]]
                styles:
                  card:
                    - padding: 14px
                    - height: 108px
                    - background-color: rgba(226, 181, 42, 0.08)
                    - border: 1px solid rgba(226, 181, 42, 0.16)
                  grid:
                    - grid-template-areas: '"i n" "i s" "l l"'
                    - grid-template-columns: 32px 1fr
                  name:
                    - justify-self: start
                    - font-size: 18px
                  state:
                    - justify-self: start
                    - font-size: 28px
                    - font-weight: 700
                  label:
                    - justify-self: start
                    - text-align: left
                    - white-space: normal
                state:
                  - operator: template
                    value: >
                      [[[
                        const irradiance = Number(states['sensor.hamburg_fu_sonneneinstrahlung']?.state);
                        return Number.isFinite(irradiance) && irradiance >= 250;
                      ]]]
                    styles:
                      card:
                        - background-color: rgba(226, 181, 42, 0.18)
                        - border: 1px solid rgba(226, 181, 42, 0.32)
                      icon:
                        - color: var(--warning-color)
              - type: custom:button-card
                entity: sensor.hamburg_fu_wetterzustand
                name: Station
                icon: mdi:radar
                show_state: true
                show_label: true
                tap_action:
                  action: navigate
                  navigation_path: radar
                state_display: >
                  [[[
                    return states['sensor.hamburg_fu_wetterzustand']?.state ?? '-';
                  ]]]
                label: >
                  [[[
                    const measured = states['sensor.hamburg_fu_zeit_messwerte']?.state ?? '-';
                    return `Messwerte ${measured} · Details im Radar-View`;
                  ]]]
                styles:
                  card:
                    - padding: 14px
                    - height: 108px
                    - background-color: rgba(99, 109, 255, 0.06)
                    - border: 1px solid rgba(99, 109, 255, 0.15)
                  grid:
                    - grid-template-areas: '"i n" "i s" "l l"'
                    - grid-template-columns: 32px 1fr
                  name:
                    - justify-self: start
                    - font-size: 18px
                  state:
                    - justify-self: start
                    - font-size: 22px
                    - font-weight: 600
                  label:
                    - justify-self: start
                    - text-align: left
                    - white-space: normal
      - cards:
          - type: heading
            heading: Naechste Stunden
            heading_style: title
          - type: weather-forecast
            entity: weather.hamburg_fu
            show_current: false
            show_forecast: true
            forecast_type: hourly
            secondary_info_attribute: latest_update_utc
          - type: entities
            title: Kurzfristiger Trend
            show_header_toggle: false
            entities:
              - entity: sensor.hamburg_fu_precip_probability_next1h
                name: Niederschlag naechste Stunde
              - entity: sensor.hamburg_fu_precip_sum_24h
                name: Niederschlag naechste 24h
              - entity: sensor.hamburg_fu_niederschlag
                name: Niederschlag aktuell
              - entity: sensor.hamburg_fu_temp_next12h_max
                name: Maximum naechste 12h
              - entity: sensor.hamburg_fu_temp_next12h_min
                name: Minimum naechste 12h
      - cards:
          - type: heading
            heading: Einordnung und Trend
            heading_style: title
          - type: grid
            columns: 3
            square: false
            cards:
              - type: entities
                title: Einordnung
                show_header_toggle: false
                entities:
                  - entity: sensor.hamburg_fu_tx_heute
                    name: Tagesmaximum
                  - entity: sensor.hamburg_fu_tn_heute
                    name: Tagesminimum
                  - entity: sensor.hamburg_fu_temp_next12h_max
                    name: Maximum naechste 12h
                  - entity: sensor.hamburg_fu_temp_next12h_min
                    name: Minimum naechste 12h
                  - entity: sensor.hamburg_fu_vorhersagezeit_local
                    name: Vorhersagezeit lokal
              - type: custom:weather-chart-card
                entity: weather.hamburg_fu
                show_main: true
                show_temperature: true
                show_current_condition: true
                show_attributes: true
                show_time: false
                show_time_seconds: false
                show_day: false
                show_date: false
                show_humidity: true
                show_pressure: true
                show_wind_direction: true
                show_wind_speed: true
                show_sun: true
                show_feels_like: true
                show_dew_point: false
                show_wind_gust_speed: false
                show_visibility: false
                show_last_changed: false
                use_12hour_format: false
                icons_size: 25
                animated_icons: false
                icon_style: style1
                autoscroll: false
                forecast:
                  precipitation_type: rainfall
                  show_probability: true
                  labels_font_size: "11"
                  precip_bar_size: "100"
                  style: style1
                  show_wind_forecast: true
                  condition_icons: true
                  round_temp: true
                  type: daily
                  number_of_forecasts: "0"
                  disable_animation: false
                units:
                  speed: ""
              - type: history-graph
                title: Temperatur-Verlauf 48h
                hours_to_show: 48
                refresh_interval: 120
                entities:
                  - entity: sensor.hamburg_fu_temperatur
                    name: Aktuell
                  - entity: sensor.hamburg_fu_tx_heute
                    name: Vorhersage-Max
                  - entity: sensor.hamburg_fu_tn_heute
                    name: Vorhersage-Min

  - title: Radar
    path: radar
    icon: mdi:radar
    type: sections
    max_columns: 2
    sections:
      - cards:
          - type: heading
            heading: Lokalradar Hamburg
            heading_style: title
            badges:
              - type: entity
                entity: sensor.hamburg_fu_precip_probability_next1h
              - type: entity
                entity: sensor.hamburg_fu_precip_sum_24h
          - type: picture-entity
            entity: camera.precipitation_3
            name: Regenradar 35 km
            show_state: false
            show_name: true
            camera_view: auto
          - type: markdown
            content: |
              **Radar-Einordnung**

              {% set rain = states('sensor.hamburg_fu_precip_probability_next1h') | float(0) %}
              {% set rain_sum = states('sensor.hamburg_fu_precip_sum_24h') | float(0) %}
              {% set current = states('sensor.hamburg_fu_niederschlag') | float(0) %}
              {% if rain >= 70 or current >= 0.3 %}
                Lokal besteht eine aktive oder kurzfristig wahrscheinliche Regenlage.
              {% elif rain_sum >= 3 %}
                Radar beobachten: im weiteren 24h-Verlauf ist relevanter Niederschlag moeglich.
              {% else %}
                Lokal aktuell keine ausgepraegte Regenlage erkennbar.
              {% endif %}
          - type: entities
            title: Niederschlagslage lokal
            show_header_toggle: false
            entities:
              - entity: sensor.hamburg_fu_niederschlag
                name: Niederschlag aktuell
              - entity: sensor.hamburg_fu_precip_probability_next1h
                name: Wahrscheinlichkeit naechste Stunde
              - entity: sensor.hamburg_fu_precip_sum_24h
                name: Niederschlag naechste 24h
              - entity: sensor.hamburg_fu_vorhersagezeit_local
                name: Forecast-Zeit lokal
      - cards:
          - type: heading
            heading: Regionalradar Norddeutschland
            heading_style: title
            badges:
              - type: entity
                entity: sensor.hamburg_fu_bewolkungsgrad
              - type: entity
                entity: sensor.hamburg_fu_nebelwahrscheinlichkeit
          - type: picture-entity
            entity: camera.precipitation_2
            name: Regenradar 250 km
            show_state: false
            show_name: true
            camera_view: auto
          - type: entities
            title: Synoptische Einordnung
            show_header_toggle: false
            entities:
              - entity: sensor.hamburg_fu_wetterzustand
                name: Wetterzustand
              - entity: sensor.hamburg_fu_bewolkungsgrad
                name: Bewoelkung
              - entity: sensor.hamburg_fu_sichtweite
                name: Sichtweite
              - entity: sensor.hamburg_fu_nebelwahrscheinlichkeit
                name: Nebelwahrscheinlichkeit

  - title: DWD Details
    path: dwd-details
    icon: mdi:chart-box-outline
    type: sections
    max_columns: 3
    sections:
      - cards:
          - type: heading
            heading: Thermik
            heading_style: title
            badges:
              - type: entity
                entity: sensor.hamburg_fu_temperatur
              - type: entity
                entity: sensor.hamburg_fu_taupunkt
          - type: entities
            title: Temperatur
            show_header_toggle: false
            entities:
              - entity: sensor.hamburg_fu_temperatur
                name: Aktuell
              - entity: sensor.hamburg_fu_taupunkt
                name: Taupunkt
              - entity: sensor.hamburg_fu_tx_heute
                name: Tagesmaximum heute
              - entity: sensor.hamburg_fu_tn_heute
                name: Tagesminimum heute
              - entity: sensor.hamburg_fu_temp_next12h_max
                name: Maximum naechste 12h
              - entity: sensor.hamburg_fu_temp_next12h_min
                name: Minimum naechste 12h
          - type: history-graph
            title: Temperatur-Verlauf 48h
            hours_to_show: 48
            refresh_interval: 120
            entities:
              - entity: sensor.hamburg_fu_temperatur
                name: Aktuell
      - cards:
          - type: heading
            heading: Luft und Sicht
            heading_style: title
            badges:
              - type: entity
                entity: sensor.hamburg_fu_luftfeuchtigkeit
              - type: entity
                entity: sensor.hamburg_fu_sichtweite
          - type: entities
            title: Atmosphaere
            show_header_toggle: false
            entities:
              - entity: sensor.hamburg_fu_luftfeuchtigkeit
                name: Relative Luftfeuchtigkeit
              - entity: sensor.hamburg_fu_absolute_luftfeuchtigkeit
