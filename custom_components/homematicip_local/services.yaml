enable_away_mode_by_calendar:
  target:
    entity:
      domain: climate
      integration: homematicip_local
  fields:
    start:
      required: false
      example: 2022-12-28 14:00
      selector:
        datetime:
    end:
      required: true
      example: 2023-01-28 14:00
      selector:
        datetime:
    away_temperature:
      required: true
      default: 18.0
      selector:
        number:
          min: 4.5
          max: 30.5
          step: 0.5
          mode: slider

enable_away_mode_by_duration:
  target:
    entity:
      domain: climate
      integration: homematicip_local
  fields:
    hours:
      required: true
      default: 6
      selector:
        number:
          min: 1
          max: 999
          step: 1
          mode: slider
    away_temperature:
      required: true
      default: 18.0
      selector:
        number:
          min: 4.5
          max: 30.5
          step: 0.5
          mode: slider

disable_away_mode:
  target:
    entity:
      domain: climate
      integration: homematicip_local

turn_on_siren:
  target:
    entity:
      domain: siren
      integration: homematicip_local
  fields:
    tone:
      example: FREQUENCY_RISING
      required: false
      selector:
        text:
    light:
      example: BLINKING_ALTERNATELY_REPEATING
      required: false
      selector:
        text:
    duration:
      example: 60
      required: false
      selector:
        text:

play_sound:
  target:
    entity:
      domain: siren
      integration: homematicip_local
  fields:
    soundfile:
      required: false
      example: "SOUNDFILE_001"
      selector:
        text:
    volume:
      required: false
      example: 0.5
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.1
          mode: slider
    on_time:
      required: false
      example: 10.0
      selector:
        number:
          min: 0.0
          max: 86400.0
          step: 0.1
          mode: box
          unit_of_measurement: "s"
    ramp_time:
      required: false
      example: 0.0
      selector:
        number:
          min: 0.0
          max: 86400.0
          step: 0.1
          mode: box
          unit_of_measurement: "s"
    repetitions:
      required: false
      example: 0
      selector:
        number:
          min: -1
          max: 18
          step: 1
          mode: box

stop_sound:
  target:
    entity:
      domain: siren
      integration: homematicip_local

set_sound_led:
  target:
    entity:
      domain: light
      integration: homematicip_local
  fields:
    color:
      required: false
      example: "red"
      selector:
        select:
          translation_key: "fixed_color"
          options:
            - "black"
            - "blue"
            - "green"
            - "turquoise"
            - "red"
            - "purple"
            - "yellow"
            - "white"
    brightness:
      required: false
      example: 255
      selector:
        number:
          min: 0
          max: 255
          step: 1
          mode: slider
    on_time:
      required: false
      example: 10.0
      selector:
        number:
          min: 0.0
          max: 86400.0
          step: 0.1
          mode: box
          unit_of_measurement: "s"
    ramp_time:
      required: false
      example: 0.0
      selector:
        number:
          min: 0.0
          max: 86400.0
          step: 0.1
          mode: box
          unit_of_measurement: "s"
    repetitions:
      required: false
      example: 0
      selector:
        number:
          min: -1
          max: 18
          step: 1
          mode: box
    flash_time:
      required: false
      example: 500
      selector:
        number:
          min: 0
          max: 5000
          step: 100
          mode: box
          unit_of_measurement: "ms"

light_set_on_time:
  target:
    entity:
      domain: light
      integration: homematicip_local
  fields:
    on_time:
      required: true
      selector:
        number:
          min: -1
          max: 8580000
          unit_of_measurement: seconds
          mode: box

switch_set_on_time:
  target:
    entity:
      domain: switch
      integration: homematicip_local
  fields:
    on_time:
      required: true
      selector:
        number:
          min: -1
          max: 8580000
          unit_of_measurement: seconds
          mode: box

valve_set_on_time:
  target:
    entity:
      domain: valve
      integration: homematicip_local
  fields:
    on_time:
      required: true
      selector:
        number:
          min: -1
          max: 8580000
          unit_of_measurement: seconds
          mode: box

set_cover_combined_position:
  target:
    entity:
      domain: cover
      integration: homematicip_local
      device_class: blind
  fields:
    position:
      required: true
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    tilt_position:
      required: false
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    wait_for_callback:
      required: false
      selector:
        number:
          min: 0
          max: 600

update_device_firmware_data:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: homematicip_local

send_text_display:
  target:
    entity:
      domain: notify
      integration: homematicip_local
  fields:
    text:
      required: true
      example: "Hello World"
      selector:
        text:
    icon:
      required: false
      example: "sun"
      selector:
        select:
          translation_key: "display_icon"
          options:
            - "no_icon"
            - "sun"
            - "moon"
            - "cloud"
            - "cloud_and_sun"
            - "cloud_and_mooon"
            - "cloud_sun_and_rain"
            - "rain"
            - "raindrop"
            - "drizzle"
            - "snow"
            - "snowflake"
            - "wind"
            - "thunderstorm"
            - "bell"
            - "clock"
            - "eco"
            - "flame"
            - "lamp_on"
            - "lamp_off"
            - "padlock_open"
            - "padlock_closed"
            - "error"
            - "everything_okay"
            - "information"
            - "new_message"
            - "service_message"
            - "shutters"
            - "window_open"
            - "external_protection"
            - "internal_protection"
            - "protection_deactivated"
    background_color:
      required: false
      example: "white"
      selector:
        select:
          translation_key: "display_color"
          options:
            - "white"
            - "black"
    text_color:
      required: false
      example: "black"
      selector:
        select:
          translation_key: "display_color"
          options:
            - "white"
            - "black"
    alignment:
      required: false
      example: "center"
      selector:
        select:
          translation_key: "display_alignment"
          options:
            - "left"
            - "center"
            - "right"
    display_id:
      required: false
      example: 1
      selector:
        number:
          min: 1
          max: 5
    sound:
      required: false
      example: "event"
      selector:
        select:
          translation_key: "display_sound"
          options:
            - "disarmed"
            - "externally_armed"
            - "internally_armed"
            - "delayed_externally_armed"
            - "delayed_internally_armed"
            - "event"
            - "error"
            - "low_battery"
    repeat:
      required: false
      example: 1
      selector:
        number:
          min: 0
          max: 15

clear_text_display:
  target:
    entity:
      domain: notify
      integration: homematicip_local
