      required: true
      selector:
        text:
    paramset:
      required: true
      example: '{"SHORT_ON_TIME_FACTOR": 3}'
      selector:
        object:
    rx_mode:
      example: BURST
      selector:
        select:
          options:
            - "BURST"
            - "WAKEUP"

