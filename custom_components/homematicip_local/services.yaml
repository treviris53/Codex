      required: true
      example: 1
      selector:
        text:

set_device_value:
  fields:
    device_id:
      required: false
      selector:
        device:
          integration: homematicip_local
    device_address:
      example: "0008789453"
      required: false
      selector:
        text:
    channel:
      required: true
      selector:
        number:
          min: 1
          max: 99
    parameter:
      required: true
      example: STATE
      selector:
        text:
    value:
      required: true
      example: 1
      selector:
        text:
    value_type:
      selector:
        select:
          options:
            - "boolean"
            - "dateTime.iso8601"
            - "double"
            - "int"
            - "string"
    wait_for_callback:
      required: false
      selector:
        number:
          min: 0
          max: 600
    rx_mode:
      example: BURST
      selector:
        select:
          options:
            - "BURST"
            - "WAKEUP"

