# Version: 1.0.0
# Root role: Legacy-/Kompatibilitätsebene. Neue Runtime-Logik gehört in config/packages/<domain>/...
# Hinweis: Root-Automationen bleiben Altbestand; fachliche Konsolidierungen erfolgen separat.
- id: '1733643487103'
  alias: Zone Notification
  description: Legacy-Root-Automation fuer die Leaving-Zone-Benachrichtigung per Blueprint.
  use_blueprint:
    path: homeassistant/notify_leaving_zone.yaml
    input:
      person_entity: person.axel
      zone_entity: zone.home
      notify_device: d6839733ad15ab7d1c27725c9c48588a
- id: '1766094325336'
  alias: Kueche Remote Tradfri (beide+einzeln)
  description: Legacy-Root-Automation fuer die Tradfri-Remote in der Kueche mit Direktsteuerung der Ziellichter.
  triggers:
  - domain: mqtt
    device_id: 0ab23a8de170309c9f75f70d68c5116f
    type: action
    subtype: toggle
    id: mid
    trigger: device
  - domain: mqtt
    device_id: 0ab23a8de170309c9f75f70d68c5116f
    type: action
    subtype: arrow_left_click
    id: left
    trigger: device
  - domain: mqtt
    device_id: 0ab23a8de170309c9f75f70d68c5116f
    type: action
    subtype: arrow_right_click
    id: right
    trigger: device
  - domain: mqtt
    device_id: 0ab23a8de170309c9f75f70d68c5116f
    type: action
    subtype: brightness_up_click
    id: up
    trigger: device
  - domain: mqtt
    device_id: 0ab23a8de170309c9f75f70d68c5116f
    type: action
    subtype: brightness_down_click
    id: down
    trigger: device
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: mid
      sequence:
      - target:
          entity_id: light.kuche
        action: light.toggle
    - conditions:
      - condition: trigger
        id: left
      sequence:
      - target:
          entity_id:
          - light.0x086bd7fffe404a82
        action: light.toggle
        data: {}
    - conditions:
      - condition: trigger
        id: right
      sequence:
      - target:
          entity_id: light.licht_herd
        action: light.toggle
    - conditions:
      - condition: trigger
        id: up
      sequence:
      - target:
          entity_id: light.kuche
        data:
          brightness_step_pct: 10
          transition: 0.2
        action: light.turn_on
    - conditions:
      - condition: trigger
        id: down
      sequence:
      - target:
          entity_id: light.kuche
        data:
          brightness_step_pct: -10
          transition: 0.2
        action: light.turn_on
  mode: restart
- id: '1766134459458'
  alias: Licht Fernseher automatisch (TV + Dunkelheit)
  description: Schaltet das Fernseherlicht bei aktivem TV und Dunkelheit ein und setzt nach TV-Aus eine kurze Sperre.
  triggers:
  - entity_id:
    - media_player.samsung_8_tv_55
    to:
    - 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 30
    id: tv_on
    trigger: state
  - entity_id: binary_sensor.dunkelheit
    to: 'on'
    for: 00:00:10
    id: dunkel
    trigger: state
  - entity_id:
    - media_player.samsung_8_tv_55
    to:
    - 'off'
    - standby
    - unavailable
    - unknown
    for:
      hours: 0
      minutes: 2
      seconds: 0
    id: tv_off
    trigger: state
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''tv_off'' }}'
      sequence:
      - target:
          entity_id: light.licht_fernseher
        action: light.turn_off
      - target:
          entity_id: timer.tv_licht_sperre
        data:
          duration: 00:02:00
        action: timer.start
    - conditions:
      - condition: template
        value_template: '{{ trigger.id in [''tv_on'',''dunkel''] }}'
      - condition: state
        entity_id: binary_sensor.dunkelheit
        state: 'on'
      - condition: template
        value_template: "{{ states('media_player.samsung_8_tv_55')\n   not in ['off','standby','unavailable','unknown']
          }}\n"
      - condition: state
        entity_id: timer.tv_licht_sperre
        state: idle
      sequence:
      - target:
          entity_id: light.licht_fernseher
        data:
          transition: 1
        action: light.turn_on
  mode: queued
  max: 10
- id: '1766313470637'
  alias: Vitrinenlicht Automatik
  description: Schaltet das Vitrinenlicht bei Dunkelheit ein und um 22 Uhr oder bei
    Helligkeit aus
  triggers:
  - trigger: state
    entity_id: binary_sensor.dunkelheit
    from: 'off'
    to: 'on'
    id: dunkel
  - trigger: sun
    event: sunset
    id: sonne
  - trigger: state
    entity_id: binary_sensor.dunkelheit
    from: 'on'
    to: 'off'
    id: hell
  - trigger: time
    at: '22:00:00'
    id: aus_22
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - dunkel
        - sonne
      - condition: time
        after: '14:00:00'
        before: '22:00:00'
      - condition: state
        entity_id: light.vitrinenlicht
        state: 'off'
      sequence:
      - target:
          entity_id: light.vitrinenlicht
        action: light.turn_on
    - conditions:
      - condition: trigger
        id:
        - hell
        - aus_22
      - condition: state
        entity_id: light.vitrinenlicht
        state: 'on'
      sequence:
      - target:
          entity_id: light.vitrinenlicht
        action: light.turn_off
  mode: single
# Legacy writer: input_boolean.anwesend wird autoritativ im Presence-Package verwaltet;
# diese Root-Automation bleibt als Kompatibilitaets-/Altbestands-Writer erhalten.
- id: '1767968135266'
  alias: Anwesenheit (Personen) -> input_boolean.anwesend
  description: Legacy-Kompatibilitaetswriter fuer input_boolean.anwesend; fachlicher Owner ist das packaged Presence-Modul.
  triggers:
  - id: someone_home
    entity_id:
    - person.axel
    - person.marina
    to: home
    trigger: state
  - id: both_away_30m
    value_template: '{{ is_state(''person.axel'', ''not_home'') and is_state(''person.marina'',
      ''not_home'') }}

      '
    for: 00:30:00
    trigger: template
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: someone_home
      sequence:
      - target:
          entity_id: input_boolean.anwesend
        action: input_boolean.turn_on
    - conditions:
      - condition: trigger
        id: both_away_30m
      sequence:
      - target:
          entity_id: input_boolean.anwesend
        action: input_boolean.turn_off
  mode: single
