automation:
  - id: roborock_weekday_scheduler
    alias: Roborock Scheduler - Woche / 3 Slots / 4 Jobs
    description: >
      Triggert alle 21 Slots ueber input_datetime, prueft den echten Wochentag
      und ruft dann die Job-Chain auf.
    triggers:
      - trigger: time
        at: input_datetime.roborock_time_mon_1
        id: mon_1
      - trigger: time
        at: input_datetime.roborock_time_mon_2
        id: mon_2
      - trigger: time
        at: input_datetime.roborock_time_mon_3
        id: mon_3
      - trigger: time
        at: input_datetime.roborock_time_tue_1
        id: tue_1
      - trigger: time
        at: input_datetime.roborock_time_tue_2
        id: tue_2
      - trigger: time
        at: input_datetime.roborock_time_tue_3
        id: tue_3
      - trigger: time
        at: input_datetime.roborock_time_wed_1
        id: wed_1
      - trigger: time
        at: input_datetime.roborock_time_wed_2
        id: wed_2
      - trigger: time
        at: input_datetime.roborock_time_wed_3
        id: wed_3
      - trigger: time
        at: input_datetime.roborock_time_thu_1
        id: thu_1
      - trigger: time
        at: input_datetime.roborock_time_thu_2
        id: thu_2
      - trigger: time
        at: input_datetime.roborock_time_thu_3
        id: thu_3
      - trigger: time
        at: input_datetime.roborock_time_fri_1
        id: fri_1
      - trigger: time
        at: input_datetime.roborock_time_fri_2
        id: fri_2
      - trigger: time
        at: input_datetime.roborock_time_fri_3
        id: fri_3
      - trigger: time
        at: input_datetime.roborock_time_sat_1
        id: sat_1
      - trigger: time
        at: input_datetime.roborock_time_sat_2
        id: sat_2
      - trigger: time
        at: input_datetime.roborock_time_sat_3
        id: sat_3
      - trigger: time
        at: input_datetime.roborock_time_sun_1
        id: sun_1
      - trigger: time
        at: input_datetime.roborock_time_sun_2
        id: sun_2
      - trigger: time
        at: input_datetime.roborock_time_sun_3
        id: sun_3
    conditions:
      - condition: state
        entity_id: input_boolean.roborock_schedule_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.roborock_busy
        state: "off"
    actions:
      - variables:
          trigger_id: "{{ trigger.id }}"
          trigger_day: "{{ trigger.id.split('_')[0] }}"
          weekday_map:
            mon: 1
            tue: 2
            wed: 3
            thu: 4
            fri: 5
            sat: 6
            sun: 7
          slot_enabled_entity: "input_boolean.roborock_slot_enabled_{{ trigger.id }}"
          jobs_entity: "input_text.roborock_jobs_{{ trigger.id }}"
      - condition: template
        value_template: "{{ now().isoweekday() == weekday_map.get(trigger_day) }}"
      - condition: template
        value_template: "{{ is_state(slot_enabled_entity, 'on') }}"
      - action: script.roborock_execute_job_chain
        data:
          slot_name: "{{ trigger_id }}"
          source: scheduler
          job_sequence: "{{ states(jobs_entity) }}"
    mode: queued
    max: 30
